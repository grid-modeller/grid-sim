# ============================================================================
# PATHWAY 1 — NESO FES 2025, "Electric Engagement" (GB)
#
# PATHWAY CHOICE (flagged judgment call, evidence note §3): the work order
# asked for "the system-transformation-style high-electrification pathway".
# In the FES 2021-2023 naming, "System Transformation" was the HYDROGEN-led
# pathway and "Consumer Transformation" the high-electrification one; in
# FES 2025 the high-electrification pathway is ELECTRIC ENGAGEMENT
# ("Net zero is achieved in Electric Engagement mainly through
# electrified demand. Consumers are highly engaged in the transition
# …" — report PDF p.26, pathways overview).
# Electric Engagement is picked because (a) it is FES 2025's
# high-electrification case as ordered; (b) Holistic Transition (the
# central pathway) is ALREADY committed at full annual resolution in
# data/reference/fes-pathway.toml — duplicating it adds nothing; (c) EE is
# the demand-side stress case (peak 143.6 GW in 2050) that complements the
# CCC Balanced Pathway (itself electrification-led) and the Royal Society
# scenarios.
#
# EXTRACTION: same mapping rules as fes-pathway.toml (grid-connected tiers
# Transmission + Distributed + Distributed - Micro; Non-Networked excluded
# and listed under exclusions; ccgt <- CCGT + Gas CCGT CHP + CCS Gas;
# ocgt <- OCGT + Gas Recips + Gas CHP; oil <- Diesel + Fuel Oil;
# nuclear <- Large + Small; biomass <- Biomass + Biomass CHP + CCS Biomass;
# waste <- Waste + Waste CHP; hydrogen_turbine <- Hydrogen + Hydrogen
# Peaking + Hydrogen CHP; battery <- Storage/Battery; pumped_hydro <-
# LDES Pumped Hydro + Liquid Air + Compressed Air). Component splits are
# given per entry so the folds stay auditable without reopening the CSV.
#
# VALIDATION (evidence note §4): every mapped sum cross-checked against
# the INDEPENDENT FLX1 table (battery/LDES power+energy, interconnectors,
# hydrogen generation, CCS gas, unabated gas, unabated biomass — all
# bit-identical at 2035 and 2050) and against the report's published
# per-pathway tables (Tables 24-34: offshore 47.8/96.4, onshore 29.0/50.7,
# solar 46.8/101.0 incl. non-networked, tidal 4.3, nuclear 4.1/21.6,
# battery 25.2/40.4, LDES 3.8/16.6, interconnectors 12.5/24.4, low-carbon
# dispatchable 0.0/54.2, unabated gas 35.3/6.3, BECCS 4.2 — all match at
# the report's 1 dp).
#
# DEMAND BASIS: ED1 "GBFES System Demand: Total" (GWh, "Annual [Fiscal]" —
# fiscal-year accounting; ES1 capacity columns carry plain year labels;
# convention flag in the evidence note §6). Includes network losses and
# grid-connected electrolysis. GB scope.
# ============================================================================
[pathways.fes2025_electric_engagement]
name = "Electric Engagement"
edition = "FES 2025 (published 2025-07-14; data tables v006, portal last_modified 2025-12-10)"
geography = "GB"
attribution = "Supported by National Energy SO Open Data"

[[pathways.fes2025_electric_engagement.years]]
year = 2035
demand_twh = 450.076          # ED1 System Demand Total, EE, 2035: 450,076 GWh (fiscal)
peak_demand_gw = 82.042       # ED1 "GBFES Peak Customer Demand: Total Consumption plus Losses", EE, 2035

# Demand components, TWh (ED1, EE, 2035; level-2 rows sum to the total:
# 136.577+158.345+115.906+4.321+9.004+25.923 = 450.076 — exact at the
