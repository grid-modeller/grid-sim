# EXCLUSIONS — CCC Balanced Pathway (the every-exclusion-with-magnitude
# law; evidence note §5/§6):
[pathways.ccc_cb7_balanced.exclusions]
# c1: SURPLUS-DRIVEN ELECTROLYSIS DEMAND is excluded from demand_twh:
#     "The production of hydrogen from surplus generation accounts for an
#     additional 29 TWh of electricity use in 2035 and 89 TWh in 2050"
#     (report p.208, immediately under Table 7.5.1; Fig 7.5.3 note 6).
#     Duplicated machine-visibly as surplus_electrolysis_excluded_twh on
#     each year block above — the two sites must stay in step.
surplus_electrolysis_demand_twh = { y2035 = 29.0, y2050 = 89.0 }
# DEMAND-BASIS WEDGE (load-bearing for any FES-vs-CCC comparison): FES
# demand INCLUDES grid-connected electrolysis (7.360 TWh 2035 / 81.910 TWh
# 2050, FES exclusions e6); CCC demand EXCLUDES surplus electrolysis. On a
# like-for-like gross-incl-electrolysis basis, 2050 is ~781 TWh (CCC,
# 692.025 + 89) vs ~785 TWh (FES EE) — nearly identical, where the
# headline 692-vs-785 comparison suggests a 93 TWh gap. 2035 inverts:
# ~472.5 TWh (CCC, 443.541 + 29) vs 450.076 TWh (FES EE).
demand_basis_wedge = "FES demand_twh includes electrolysis; CCC demand_twh excludes surplus electrolysis — never compare the two headline demands without this wedge"
# WARNING: a scenario that runs demand_twh = 692.025 against the published
# CCC fleet UNDER-LOADS that fleet by ~13% (89/692) and will misstate
# curtailment and adequacy — the fleet is sized for demand + electrolysis.
scenario_warning = "running 692 TWh against the CCC 2050 fleet under-loads it ~13%; add the electrolysis load (as flexible or firm, a declared convention) before quoting adequacy/curtailment"

# ----------------------------------------------------------------------------
# CCC AGGREGATES — published buckets the engine's technology ids CANNOT
# take without a split or modelling decision. mappable = false is
# LOAD-BEARING: a scenario builder MUST NOT consume these rows without a
# declared, reviewed split rule (the split is the scenario package's
# decision, not this file's). Values from sheet 7.5.3 (GW).
# ----------------------------------------------------------------------------
