# ============================================================================
# Stage 7 published-pathway reference (data engineer, 2026-07-06) — DRAFT
# until reviewed and pinned. The cited capacity/demand tables needed to
# express two published GB decarbonisation pathways as simulator scenarios
# (docs/04 Stage 7: "scenario pack for published pathways (FES, CCC,
# Royal Society)"; the Royal Society leg is already committed as
# scenarios/royal-society-37y*.toml). Evidence note:
# docs/notes/stage7-pathways-data-report.md.
#
# NO PARSER EXISTS YET for this schema — the scenario package (next) writes
# it and registers the schema in docs/03 per the costs-reference-v1
# precedent. Field shapes for fleet/storage entries deliberately match
# fes-pathway-v1 (technology/capacity_gw; kind/power_gw/energy_gwh) so the
# scenario package can reuse those conventions mechanically.
#
# CONVENTIONS
# - Units: GW, GWh, TWh throughout (converted from source MW/GWh at a
#   single point; rounding at output only: GW/GWh 4 dp, TWh 3 dp — the
#   fes-pathway.toml convention). CCC values are carried at the source's
#   own published precision (some are rounded integers; each is marked).
# - Snapshot years: 2035 and 2050, as ordered. FES cross-check years
#   (2030/2040) appear only in comments.
# - fleet entries carry ONLY unambiguous mappings to engine technology
#   ids. Anything requiring a split or modelling decision is carried under
#   [[...aggregates]] with mappable = false — those rows MUST NOT be
#   consumed by a scenario builder without a declared, reviewed split rule.
# - Every number carries its citation (file, sheet/table, row) in a
#   comment. Raw source files are NOT committed (fetch-and-build law);
#   sha256 manifests: data/packs/fes2025.sha256, data/packs/cb7.sha256.
#
# LICENCES (verdicts and exact clause references in the evidence note §2)
# - FES 2025: NESO Open Data Licence — copy/publish/distribute/adapt/
#   commercially exploit, with attribution "Supported by National Energy
#   SO Open Data"; NESO states CC BY 4.0 compatibility. Re-verified
#   2026-07-06. Redistribution of this derived table is permitted.
# - CCC CB7: theccc.org.uk copyright page: "The material on this website
#   is licensed under the Open Government Licence v3.0 except where
#   otherwise stated" (re-verified 2026-07-06); the dataset workbooks
#   carry no overriding statement; the report PDF carries CCC's own
#   permissive notice (printed p.3: reproduce free of charge, accurately, acknowledge
#   "Climate Change Committee copyright" + document title).
#   Redistribution of these derived numbers with attribution is permitted.
#   NOTE: this SUPERSEDES the stage7-cost-inputs-report §10.4 finding
#   ("no explicit open licence found") — the copyright-terms page states
#   OGL v3.0.
# ============================================================================

schema = "pathways-published-v1"
assembled = 2026-07-06
snapshot_years = [2035, 2050]

