# ============================================================================
# PATHWAY 2 — CCC Seventh Carbon Budget, "Balanced Pathway" (UK)
#
# The Seventh Carbon Budget advice (26 Feb 2025) is the CCC's current
# carbon-budget pathway; licence-clean (OGL v3.0 site statement, §2 of the
# evidence note), so CB7 is used, not CB6. The Sept-2025 corrections log
# was checked: no correction touches the electricity supply capacity or
# demand figures. The March-2026 "Supplementary analysis" report exists
# but the Feb-2025 advice dataset remains the pathway of record.
#
# SCOPE FLAG: CCC numbers are UNITED KINGDOM; the engine models GB.
# Northern Ireland (~3% of UK electricity demand; part of the Irish
# synchronous area) is NOT separable from the published tables. Carried
# as-published; the scenario package must state the UK-as-GB approximation
# or derate — its decision, flagged here.
#
# GRANULARITY: CCC publishes capacity in ELEVEN buckets (Figure 7.5.3),
# far coarser than FES. Only five map unambiguously to engine ids; the
# rest are carried as aggregates with mappable = false.
#
# CITATIONS: capacity mix = charts workbook sheet "7.5.3" (rows 13-23,
# columns 2023/2030/2035/2040/2045/2050); battery / medium-duration GW =
# sheet "7.5.4" CCC-milestone rows; storage GWh = report Table 7.5.1
# (printed p.208, rounded integers as published); demand = full dataset
# "Economy-wide data" / "Sector-level data" sheets (scenario = Balanced
# Pathway, variable = "Energy: gross demand electricity").
# Bucket definitions = Figure 7.5.3 notes (report p.213): "'Other'
# includes unabated biomass, energy from waste, hydro, and combined heat
# and power. Low-carbon dispatchable includes gas CCS and hydrogen."
# ============================================================================
[pathways.ccc_cb7_balanced]
name = "Balanced Pathway"
edition = "The Seventh Carbon Budget (CCC, 26 Feb 2025; charts workbook v2)"
geography = "UK"                # NOT GB — see scope flag above
attribution = "Climate Change Committee, The Seventh Carbon Budget (2025); CCC and AFRY analysis"

[[pathways.ccc_cb7_balanced.years]]
year = 2035
demand_twh = 443.541
surplus_electrolysis_excluded_twh = 29.0
# Full dataset, Economy-wide, "Energy: gross demand electricity", Balanced
# Pathway, UK, 2035 = 443.5405884900234 TWh. Report Table 7.5.1 rounds to
# 444. Dataset definition (Variable definitions sheet, verbatim): "Gross
# energy demands are inclusive of all system-wide uses of each fuel type
# from the sector's perspective, regardless of whether the fuel is used at
# primary or final stage." Calendar year; before-losses caveats per
# Figure 7.5.3 note (2).
# demand_twh EXCLUDES surplus-driven electrolysis: "The production of
# hydrogen from surplus generation accounts for an additional 29 TWh of
# electricity use in 2035 and 89 TWh in 2050" (report p.208, under
# Table 7.5.1; Fig 7.5.3 note 6: "Generation includes surplus electricity
# used for electrolytic hydrogen production") — the CCC fleet is sized to
# serve demand PLUS this. See [pathways.ccc_cb7_balanced.exclusions].

# Sector components, TWh (full dataset, Sector-level data, same variable;
# sum = 443.541, reconciled exact against the economy-wide total):
[pathways.ccc_cb7_balanced.years.demand_components]
residential_buildings_twh = 137.883
non_residential_buildings_twh = 91.984
industry_twh = 98.801
surface_transport_twh = 100.970
agriculture_twh = 3.460
shipping_twh = 2.253
aviation_twh = 0.0
fuel_supply_twh = 7.564
engineered_removals_twh = 0.626

[[pathways.ccc_cb7_balanced.years.fleet]]
technology = "nuclear"
capacity_gw = 6.09            # sheet 7.5.3 row 13

