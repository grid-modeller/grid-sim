# FES 2025 "Holistic Transition" pathway reference — GB installed capacity
# by technology by year, 2024-2050, for the Stage 6 part 2 Q8 pathway
# runner (docs/04: largest survivable loss vs year). Assembled 2026-07-03
# (data engineer). Every number carries its citation; the committed file
# is regenerated deterministically by scripts/fes-pathway/build.py and
# audited by scripts/fes-pathway/validate.py.
#
# PATHWAY CHOICE: Holistic Transition is FES 2025's central net-zero
# pathway — the only pathway achieving the 2030 NDC (report p.31), and
# the basis of NESO's Clean Power 2030 advice (report p.43). The other
# published pathways are Electric Engagement, Hydrogen Evolution, the
# Ten Year Forecast and the Falling Behind counterfactual.
#
# SOURCES (all retrieved 2026-07-03)
# Primary (machine-readable, the published FES data tables on the NESO
# Data Portal — identical values to the Data Workbook sheets):
# [ES1] "FES: Pathways to Net Zero – Electricity Supply Data Table (ES1)",
#   2025 edition v006 (portal last_modified 2025-12-10). All capacities.
#   https://api.neso.energy/dataset/549b0667-b533-4748-95bd-f6e13933a47d/resource/6c78a777-b885-4bb6-bc35-8100f9e137a2/download/fes2025_es1_v006.csv
#   sha256 7b7957443d37a09304fe2877bfa2a7a2fa71f8c00cb9f26308bd58391a4ff805
# [ED1] "FES: Electricity Demand Summary Data Table (ED1)", 2025 v006.
#   The demand_twh series. Definitions: ED2 PDF on the same dataset page.
#   https://api.neso.energy/dataset/2c15c755-d8fe-4229-9169-3b6dd7c88fec/resource/300c07b9-baeb-4411-bc40-987cbb4aec0b/download/fes2025_ed1_v006.csv
#   sha256 bd36b16b3f3d0cc5cc8e5118590777d18e3e501a72b325b3de617aa17d15bc24
# Cross-checks and provenance (not read by build.py):
# [FLX1] "FES: Flexibility Data Table (FLX1)", 2025 v006 — independent
#   storage/interconnector/dispatchable totals, checked by validate.py.
#   https://api.neso.energy/dataset/2e3275e2-dd6a-4c2e-8cfb-eeb9b4320dcb/resource/299bc6c8-7608-4946-ab0a-5bc22129c897/download/fes2025_flx1_v006.csv
#   sha256 a5049beb77c3a58ba21f975177d309b207c667176a702387b269102fa4594462
# [WB] "FES: Data Workbook 2025" (xlsx). Its ES1 sheet was verified
#   value-identical to [ES1] during assembly (2026-07-03, row-level
#   comparison); kept for provenance, not read by these scripts.
#   https://www.neso.energy/document/364551/download
#   sha256 f11b9a2c08084d4c4596d67d9e498f46c8739d942ad7dd383580365e10405593
# [RPT] "FES: NESO Pathways to Net Zero 2025" (report PDF, July 2025) —
#   the spot-check citations below.
#   https://www.neso.energy/document/364541/download
#   sha256 184c745d74cbf406f3adf5c4b1d73796cfa61d48453414fb30ba4ce3a7172a34
#
# LICENCE: NESO Open Data Licence
# (https://www.neso.energy/data-portal/neso-open-licence) — the licence
# recorded on every Data Portal dataset above. It grants a worldwide,
# royalty-free, perpetual licence to copy, publish, distribute, adapt and
# exploit the information commercially and non-commercially, with
# attribution; NESO states it is CC BY 4.0 compatible. Redistributing
# this derived table is therefore permitted. Required attribution
# (carry it on published outputs derived from this file):
#   "Supported by National Energy SO Open Data"
#
# GRANULARITY: NESO publishes ES1 annually, 2024-2050 inclusive (27
# values per row); every published year is recorded, nothing is
# interpolated. 2024 is the pathway's base year ("Today" in report
# Table 3). ED1 demand is labelled "Annual [Fiscal]" (fiscal-year
# accounting; see the ED2 definitions PDF); ES1 capacity columns carry
# plain year labels. ED1 also publishes 2023; there is no matching 2023
# fleet in ES1, so this file starts at 2024.
#
# UNITS & ROUNDING: capacity_gw = sum of ES1 MW / 1000 rounded to 4 dp
# (0.1 MW); energy_gwh rounded to 4 dp; demand_twh = ED1 GWh / 1000
# rounded to 3 dp. Python banker's rounding, applied only at output.
#
# TECHNOLOGY MAPPING (ES1 Type/SubType -> scenario technology id).
# Capacities are summed over Connection in {Transmission,
# Distributed, Distributed - Micro} — the grid-connected tiers.
# Per-component splits below are GW at 2024/2030/2040/2050 so the
# folds stay auditable without reopening the CSV.
#
# ccgt <- Gas/CCGT + Gas/Gas CCGT CHP + CCS Gas/CCS Gas.
#   All combined-cycle machine classes: synchronous steam+GT sets,
#   grid-core derived default H = 5.0 s. Gas CCS is a CCGT with
#   post-combustion capture — same rotating plant, so it keeps the
#   ccgt id; a separate open-set id (e.g. gas_ccs) would silently
#   pick up grid-core's unknown-id default (non-synchronous, no H),
#   which is physically wrong for this plant. CAVEAT for economic
#   use: the entry migrates from unabated to abated plant — by 2050
#   the whole 22.205 GW is CCS gas.
#     Gas / CCGT                         2024: 30.8533  2030: 20.568  2040: 5.408  2050: 0.0
#     Gas / Gas CCGT CHP                 2024: 2.0403  2030: 1.9373  2040: 0.226  2050: 0.0
#     CCS Gas / CCS Gas                      2024: 0.0  2030: 0.86  2040: 19.625  2050: 22.205
#
# ocgt <- Gas/OCGT + Gas/Gas Reciprocating Engines + Gas/Gas CHP.
#   The synchronous non-CCGT unabated gas bucket (peakers, engines,
#   small distributed CHP). NESO separates 'Gas CCGT CHP' from
#   'Gas CHP', so the latter is taken as engine/OCGT-class plant.
#   grid-core default H = 4.0 s (wide combustion-turbine band).
#     Gas / OCGT                         2024: 1.8015  2030: 3.7975  2040: 2.4626  2050: 0.0
#     Gas / Gas Reciprocating Engines    2024: 2.8355  2030: 3.421  2040: 0.471  2050: 0.0
#     Gas / Gas CHP                      2024: 1.7814  2030: 1.4566  2040: 0.0  2050: 0.0
#
# oil <- Other Thermal/Diesel + Other Thermal/Fuel Oil.
#   'oil' is in the standard firm roster (scenario.rs), but note:
#   grid-core's inertia table has no 'oil' arm, so it gets the
#   unknown-id default (non-synchronous, no H) even though these
#   are synchronous machines. Small and shrinking (1.62 GW 2024 ->
#   0 by 2050); a scenario that cares must set inertia_h explicitly.
#     Other Thermal / Diesel                       2024: 1.4078  2030: 0.6518  2040: 0.0615  2050: 0.0
#     Other Thermal / Fuel Oil                     2024: 0.2123  2030: 0.2123  2040: 0.14  2050: 0.0
#
# nuclear <- Nuclear - Large + Nuclear - Small (SMRs). One id: both
#   are synchronous steam plant (H default 4.5 s).
#     Nuclear / Nuclear - Large              2024: 6.076  2030: 2.9  2040: 6.68  2050: 6.68
#     Nuclear / Nuclear - Small              2024: 0.0  2030: 0.0  2040: 3.29  2050: 7.52
#
# biomass <- Biomass + Biomass CHP + CCS Biomass (BECCS). BECCS is
#   folded in because it is the same steam machine class with
#   capture added, and NESO's own headline groups 'Biomass/BECCS'
#   (report Table 3, p.45). Waste is NOT folded in — see waste.
#     Biomass / Biomass                      2024: 4.1668  2030: 3.0006  2040: 0.843  2050: 0.708
#     Biomass / Biomass CHP                  2024: 0.0893  2030: 0.0964  2040: 0.1076  2050: 0.1253
#     CCS Biomass / CCS Biomass                  2024: 0.0  2030: 0.6  2040: 2.662  2050: 2.662
#
# waste <- Waste + Waste CHP, kept as its own (open-set) id:
#   NESO's published biomass headline (Table 3: 4.3 GW today)
#   EXCLUDES waste, so folding it into biomass would break every
#   reconciliation against the report. Energy-from-waste is
#   steam-cycle synchronous plant, but as an unknown id grid-core
#   defaults it to non-synchronous — scenarios wanting its inertia
#   must set inertia_h (~4 s steam band) explicitly.
#     Waste / Waste                        2024: 2.9377  2030: 3.0027  2040: 2.4991  2050: 1.6423
#     Waste / Waste CHP                    2024: 0.2637  2030: 0.7226  2040: 0.9227  2050: 0.9561
#
# hydro <- Hydro (all tiers). Run-of-river/small hydro; synchronous,
#   H default 3.0 s. (Pumped storage is a StorageKind, not here.)
#     Hydro / Hydro                        2024: 1.8625  2030: 1.8891  2040: 1.9419  2050: 1.9778
#
# marine <- Other Renewable/Marine (tidal stream + wave; the report
#   calls this 'Tidal', Table 27). Own open-set id: it is inverter-
#   coupled variable renewable, so grid-core's unknown-id default
#   (non-synchronous, no H) is the physically correct one, and
#   folding it into hydro would wrongly make it firm + synchronous.
#     Other Renewable / Marine                       2024: 0.062  2030: 0.3436  2040: 0.6344  2050: 1.6644
#
# other <- Other Renewable/Geothermal CHP. 11 MW from 2027; kept
#   only so the ES1 capacity total reconciles to the last MW.
#     Other Renewable / Geothermal CHP               2024: 0.0  2030: 0.011  2040: 0.011  2050: 0.011
#
# onshore_wind / offshore_wind / solar <- the like-named ES1 rows,
#   summed over tiers. 'Distributed - Micro' (rooftop solar 33.1 GW,
#   micro wind 1.0 GW by 2050) is INCLUDED: per decision D3 the
#   model uses the total-generation convention with embedded
#   capacity modelled explicitly.
#   offshore_wind EXCLUDES the 'Non-Networked' tier (direct-wired
#   to electrolysis, never grid-connected): 0 MW in 2024, 25.94 MW
#   in 2030, 371.77 MW in 2040, 442.91 MW in 2050. NESO's headline
#   offshore capacity (Table 24: 104.4 GW in 2050) INCLUDES it;
#   the grid-connected figure recorded here is 103.9305 GW.
#     Onshore Wind / Onshore Wind                 2024: 14.5539  2030: 29.8173  2040: 41.959  2050: 47.4528
#     Offshore Wind / Offshore Wind                2024: 15.4527  2030: 46.4634  2040: 93.1945  2050: 103.9305
#     Solar PV / Solar PV                     2024: 18.7885  2030: 46.6529  2040: 77.712  2050: 97.0387
#
# interconnector <- Interconnectors (nameplate link capacity; all
#   HVDC, non-synchronous).
#     Interconnectors / Interconnectors              2024: 9.8  2030: 11.7  2040: 20.8  2050: 21.8
#
# hydrogen_turbine <- Hydrogen + Hydrogen Peaking + Hydrogen CHP.
#   Hydrogen-fuelled GENERATION, recorded as a clearly-named fleet
#   entry and deliberately NOT folded into the 'hydrogen'
#   StorageKind: the v1 modelling choice makes hydrogen storage
#   reconversion non-synchronous, and grid-core's guidance is that
#   a hydrogen-turbine scenario 'should model the turbines as a
#   fleet entry with an explicit H' (grid-core/src/inertia.rs).
#   As an unknown id it defaults to non-synchronous, no H;
#   scenarios asserting synchronous H2 turbines must set inertia_h
#   (combustion-turbine band ~4 s) explicitly. The charge side of
#   the hydrogen chain (grid-connected electrolysis: 0.77 GW 2030
#   -> 15.66 GW 2050, FLX1) and NESO's H2 storage volumes (whole-
#   system TWh of H2, report Table 38) are published elsewhere and
#   are NOT electricity-storage power/energy pairs, so no
#   'hydrogen' storage entry is emitted — see OMITTED below.
#     Hydrogen / Hydrogen                     2024: 0.0  2030: 0.0  2040: 0.0  2050: 15.897
#     Hydrogen / Hydrogen Peaking             2024: 0.0  2030: 0.0  2040: 4.8586  2050: 9.186
#     Hydrogen / Hydrogen CHP                 2024: 0.0  2030: 0.1447  2040: 0.989  2050: 0.9989
#
# STORAGE MAPPING (power = ES1 'Capacity (MW)', energy = ES1
# 'Storage Capacity (GWh)', same tier rule).
#
# battery <- Storage/Battery, all tiers (Distributed - Micro is
#   residential batteries; included per D3 as above).
#
# pumped_hydro <- LDES/Pumped Hydro + LDES/Liquid Air +
#   LDES/Compressed Air. StorageKind is a CLOSED set (battery |
#   pumped_hydro | hydrogen | dsr), so LAES/CAES cannot carry their
#   own kind. They are folded into pumped_hydro because (a) NESO
#   itself aggregates exactly these three as 'long duration
#   electricity storage' (report Table 29: 5.3 GW 2030, 16.5 GW
#   2050 = PH+LAES+CAES to the decimal), and (b) all three
#   discharge through turbines, so pumped_hydro's synchronous
#   H = 4.5 s default is the nearest physical class (it is an
#   approximation for LAES/CAES, and for VSD-driven charging).
#   Component splits (GW / GWh):
#     Pumped Hydro     2024: 2.744/28.004  2030: 4.1439/38.6883  2040: 7.0399/102.5423  2050: 7.0399/102.5423
#     Liquid Air       2024: 0.005/0.02  2030: 1.1549/8.1194  2040: 5.4549/36.3194  2050: 5.4549/36.3194
#     Compressed Air   2024: 0.0033/0.0165  2030: 0.0033/0.0165  2040: 1.5033/30.0165  2050: 4.0033/80.0165
#
# OMITTED (published by NESO, not representable in this schema):
# - StorageKind hydrogen: no electrical power/energy pair is published —
#   see the hydrogen_turbine note above.
# - StorageKind dsr: NESO publishes DSR as negative peak-impact
#   decompositions (FLX1 2030 HT: residential appliance DSR -3.0 GW, I&C
#   DSR -1.7 GW, smart charging -2.74 GW, V2G -1.19 GW at peak, ...) and
#   an ES1 'Demand Reduction' energy line (0.0587 TWh in 2030), not a
#   storage-like power/energy pair. Deriving one would be a modelling
#   choice, not transcription — left to the Q6 DSR work.
# - Non-capacity ES1 variables (Generation/Consumption/Curtailment/
#   Emissions/Import/Export/Netflows TWh, DACCS demand) — out of scope.
#
# VALIDATION (spot-checks reproduced by scripts/fes-pathway/validate.py;
# published values from [RPT], derived values are the mapped sums above
# rounded to the report's 1 dp):
#   [RPT] citation                            published   derived
#   Table 3  p.45  2024 offshore wind         15.5        15.4527
#   Table 3  p.45  2024 onshore wind          14.6        14.5539
#   Table 3  p.45  2024 solar                 18.8        18.7885
#   Table 3  p.45  2024 nuclear                6.1         6.076
#   Table 3  p.45  2024 biomass/BECCS          4.3         4.2562
#   Table 3  p.45  2024 unabated gas          39.3        39.3121
#   Table 3  p.45  2024 batteries              6.8         6.7779
#   Table 3  p.45  2024 LDES                   2.8         2.7523
#   Table 24 p.130 offshore wind 2030/2050    46.5/104.4  46.4893/104.3734 (incl. non-networked)
#   Table 25 p.132 onshore wind 2030/2050     29.8/47.5   29.8173/47.4528
#   Table 26 p.134 solar 2030/2050            46.7/97.0   46.6529/97.0387
#   Table 27 p.136 tidal (marine) 2050         1.7         1.6644
#   Table 28 p.138 batteries 2030/2050        23.2/39.3   23.1693/39.3474
#   Table 29 p.140 LDES 2030/2050              5.3/16.5    5.3021/16.4981
#   Table 30 p.142 interconnectors 2030/2050  11.7/21.8   11.7/21.8
#   Table 31 p.144 nuclear 2030/2050           2.9/14.2    2.9/14.2
#   Table 32 p.146 low-carbon disp. 2030/2050  1.0/48.3    1.0047/48.2869 (CCS gas + hydrogen_turbine)
#   Table 33 p.148 unabated gas 2030/2050     31.2/0.0    31.1804/0.0
#   Table 34 p.150 BECCS 2030/2050             0.6/2.7     0.6/2.662
# validate.py additionally cross-checks ES1 sums against the independent
# FLX1 table (battery, pumped-hydro/LAES/CAES power & energy,
# interconnectors, hydrogen generation, unabated gas) and reconciles the
# grand total: every ES1 Holistic Transition capacity MW is either mapped
# into an entry below or listed as a documented exclusion (non-networked
# offshore wind only).
#
# REGENERATION: python scripts/fes-pathway/fetch.py <repo-root>
#               python scripts/fes-pathway/build.py <repo-root>
#               python scripts/fes-pathway/validate.py <repo-root>

schema = "fes-pathway-v1"
name = "Holistic Transition"
fes_edition = "FES 2025"

# --- Q8 current-holdings variant: the ONLY divergence from the base file ---
# (provenance in the header above; per-number citations in
# data/reference/response-holdings-2025.toml)

[[assumptions.responses]]
name = "dynamic_containment_lf"    # EAC product DCL, post-fault
mw = 1178                          # FY2025 mean cleared volume
delivery_factor = 1.0              # contract convention (see header)
droop_full_deviation_hz = 0.5      # saturation fs = fn +/- 0.5 Hz (Service Terms)
delay_s = 0.5                      # TiMAX (Service Terms)
ramp_s = 0.5                       # TdMAX 1 s - TiMAX 0.5 s

[[assumptions.responses]]
name = "dynamic_moderation_lf"     # EAC product DML, pre-fault fast
mw = 416                           # FY2025 mean cleared (Jun 2026 mean: 500)
delivery_factor = 1.0              # contract convention (see header)
droop_full_deviation_hz = 0.2      # saturation fs = fn +/- 0.2 Hz
delay_s = 0.5                      # TiMAX (Service Terms)
ramp_s = 0.5                       # TdMAX 1 s - TiMAX 0.5 s

[[assumptions.responses]]
name = "dynamic_regulation_lf"     # EAC product DRL, pre-fault slow
mw = 461                           # FY2025 mean cleared
delivery_factor = 1.0              # contract convention (see header)
droop_full_deviation_hz = 0.2      # saturation fs = fn +/- 0.2 Hz
delay_s = 2.0                      # TiMAX, 2 s standalone (Service Terms)
ramp_s = 8.0                       # TdMAX 10 s - TiMAX 2 s

# No sustain_s on any service: contracted delivery durations (DC 15 min /
# DM 30 min / DR 60 min) all exceed the 120 s survival window.
