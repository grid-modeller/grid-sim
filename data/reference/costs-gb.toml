# ----------------------------------------------------------------------------
# Storage (D8 rule 1.3: power and energy priced separately).
# ----------------------------------------------------------------------------

[storage.battery_li_ion]
# QUARANTINE LIFTED (quotable = true) 2026-07-06 — THE COORDINATED
# REVIEWED ACT the review demanded. Condition 3.i's evidence requirement
# (re-verify the NREL 2025 storage-cost bracket against the primary) was
# DISCHARGED 2026-07-06 (cross-check record below; committed 23676f1);
# this revision is the coordinated reference+engine change citing that
# re-verification: the grid-core parser guard that rejected
# quotable = true for this row is removed in the same revision, and the
# pinned tests now byte-pin the LIFTED flag line (the same anti-silent-
# change discipline, pointed at the new state). CAVEATS 3.ii AND 3.iii
# REMAIN IN FORCE (below) and still propagate to every quoting artefact.
# Split DERIVED from BEIS/Mott MacDonald 2018 (OGL; 2012 prices) by
# differencing the 50MW/50MWh (1h) and 200MW/800MWh (4h) configurations:
#   2030-build medium: 1h 286.6, 4h 579.7 GBP/kW
#     -> energy (579.7-286.6)/3 = 97.7 GBP/kWh; power 188.9 GBP/kW (2012)
#     -> x1.3873 = 135.5 GBP/kWh + 262.1 GBP/kW (2024 GBP)
#   2018-build medium: 1h 590.3, 4h 1462.1
#     -> 290.6 -> 403.2 GBP/kWh; 299.7 -> 415.8 GBP/kW (2024 GBP)
# DERIVATION CAVEATS (review condition 3.ii): the differencing ignores the
# two configurations' differing infrastructure costs (5.8 vs 34.1 GBP/kW
# medium, 2012 GBP) and use-case archetypes (FM vs PL-DA) — the split is a
# duration-attribution over CAPEX only. STALENESS (condition 3.iii): a 2018
# projection vintage; the stamp propagates to any artefact quoting a
# battery-containing cost.
# Cross-check RE-VERIFIED AGAINST THE PRIMARY (2026-07-06, retrieved from
# OSTI.GOV, the US DOE repository of record — nrel.gov remains unreachable
# from this environment): NREL, Cost Projections for Utility-Scale Battery
# Storage: 2025 Update (Cole, Ramasamy, Turan), NREL/TP-6A40-93281,
# June 2025, values in 2024 USD; Table 2 (appendix p.16), 4h total-system
# overnight $/kWh: 2030 low/mid/high 207/279/354; 2035 147/243/339; 2050
# 108/178/307. (The earlier SECONDARY-sourced "mid ~247, low 152 (2035)"
# was ~$4-5/kWh off the primary and compared the wrong year.) The
# BEIS-derived 2030-build 4h total (135 + 262/4 = 200.5 GBP/kWh 2024
# = ~257 $/kWh at ~1.28 USD/GBP, 2024 average) sits INSIDE the primary's
# 2030 bracket, between low and mid. Corroboration: NREL's selected life
# (15 yr) and RTE (85%) match this row exactly; NREL's selected FOM (4% of
# the $/kW cost, ~53 $/kW-yr, deliberately augmentation-inclusive) is a
# DIFFERENT BASIS from the BEIS simple-maintenance 12.9 GBP/kW-yr — named,
# not reconciled. Report pinned: data/packs/costs-evidence.sha256
# (nrel-tp-6a40-93281.pdf, sha256 6241ee4f...a53). Licence: US federally
# sponsored NREL technical report, publicly available at no cost,
# comment-level cross-check only (review condition 12 posture).
# DEA catalogue: no licence stated -> not used.
source = "beis_storage_2018"
quotable = true                           # condition 3.i DISCHARGED 2026-07-06: NREL/TP-6A40-93281 primary re-verified (costs-evidence.sha256); lift = this reviewed revision; caveats 3.ii/3.iii REMAIN
power_gbp2024_per_kw_2030build = 262
energy_gbp2024_per_kwh_2030build = 135
power_gbp2024_per_kw_2018build = 416
energy_gbp2024_per_kwh_2018build = 403
fom_gbp2024_per_kw_yr = 12.9              # 4h config, 2030-build medium, x1.3873
