# ----------------------------------------------------------------------------
# WACC (D8 rule 4). Real rates, applied UNIFORMLY by default.
# low  = Ofgem RIIO-3 FD allowed REAL (CPIH) WACC for electricity
#        transmission, Table 16 "WACC allowance (real)": 4.46-4.67% at 55%
#        gearing — the regulated-asset financing floor in real terms.
#        [Re-anchored per review condition 1: the previous 5.5/5.6 figure was
#        Ofgem's SEMI-NOMINAL WACC (5.53-5.74%), a different object ~110 bp
#        above the real allowance — a wedge larger than the CPI/CPIH wedge.]
# central = CEPA lead scenario, established CfD-class generation (L-M band,
#        pre-tax real CPI vanilla, 50% gearing).
# high = CEPA M-H band (nascent / merchant-exposed).
# Basis caveats: CEPA is pre-tax real-CPI vanilla; Ofgem real WACC is
# CPIH-real vanilla with a post-tax equity component. The set is a labelled
# sensitivity spread over cited GB financing evidence, not a like-for-like
# composite — quoted as such on every artefact (evidence note §5).
# ----------------------------------------------------------------------------
[wacc]
real_low = 0.045
real_central = 0.075
real_high = 0.100
anchors_unrounded = { low_range = [0.0446, 0.0467], central = 0.076, high = 0.101 }
sources = ["ofgem_riio3_fd", "cepa_hurdle_2024"]

