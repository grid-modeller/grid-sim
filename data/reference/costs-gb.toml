# ============================================================================
# Stage 7 GB cost reference (data engineer, 2026-07-03) — ADOPTED.
# Reviewer adjudicated ACCEPT-WITH-NOTES (docs/notes/stage7-cost-inputs-review.md,
# 2026-07-03); ALL TWELVE CONDITIONS AND NOTES x2-x4 APPLIED IN THIS REVISION.
# Pinned into docs/04 Stage 7 (2026-07-03, supervisor, citing the review);
# this file is the consumed reference for all Stage 7 cost lines, read by
# the strict costs-reference-v1 parser (grid_core::costs_reference; schema
# note in docs/03-domain-model.md). Any change to this file's shape or
# numbers requires a schema-string bump and re-review; the parser's pinned
# regression tests (grid-core/tests/costs_reference.rs) fail on silent edits.
# Quarantined rows carry machine-readable quotable/verified flags, which are
# LOAD-BEARING and propagate to result metadata: NSL/NeuConnect/Greenlink
# (condition 9, still quarantined); the OCHT publication_gate and the
# nuclear bracket_rule propagate the same way. The battery split's
# condition-3 quarantine was LIFTED 2026-07-06 as a reviewed act (condition
# 3.i discharged against the NREL primary — see the row); caveats 3.ii and
# 3.iii on that row REMAIN in force and still propagate.
# Evidence note: docs/notes/stage7-cost-inputs-report.md.
#
# Conventions:
# - Price base: real 2024 GBP throughout ("gbp2024" in field names where a
#   conversion was applied). Conversions use the ONS GDP deflator (2024=100)
#   as tabulated in the DESNZ FFPA 2025 workbook ([deflator] below).
# - Capex basis: OVERNIGHT component costs (pre-development + construction;
#   site infrastructure separate). IDC is NOT in these numbers — DESNZ applies
#   the hurdle rate over the published build phasing. Per review condition 11
#   the central phasing arrays are transcribed per technology
#   (predev_phasing / build_phasing, fractions summing to 1.0): the rule-4
#   annualiser must escalate capex over this phasing at the same WACC, or
#   report the build-time effect as a named adjustment (evidence note §1).
# - capex ranges are [low, central, high] as published (low capex paired
#   with low pre-development cost).
# - Storage is split per D8 rule 1.3: power (£/kW) and energy (£/kWh) legs
#   priced separately; hydrogen legs per the D4 per-leg convention.
# ============================================================================

schema = "costs-reference-v1"
price_base = "real 2024 GBP"
assembled = 2026-07-03

# ----------------------------------------------------------------------------
# Deflator: ONS GDP deflator at market prices, 2024 = 100, as published in
# the DESNZ Fossil Fuel Price Assumptions 2025 data workbook ("UK GDP
# Deflator" sheet, source ONS; OGL v3.0). Operational series going forward:
# HM Treasury "GDP deflators at market prices, and money GDP" (quarterly).
# Reviewer-verified to 4 dp against the re-fetched workbook.
# ----------------------------------------------------------------------------
[deflator]
series = "ONS GDP deflator at market prices (2024 = 100), via DESNZ FFPA 2025 workbook"
licence = "OGL v3.0"
to_2024 = { y2012 = 1.3873, y2014 = 1.3410, y2020 = 1.1714, y2021 = 1.1731, y2023 = 1.0384, y2025 = 0.9692 }

