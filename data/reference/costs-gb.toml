[storage.hydrogen.cavern]
# LEVELISED-WITH-CONVENTION (review condition 5, option (a) adopted): no
# open GB primary publishes salt-cavern capex in GBP/kWh_H2; a derived capex
# was rejected as an unsourced construction. DESNZ H2 T&S Cost Report
# (Dec 2023): new salt cavern (CGH2) 0.26 GBP/kg levelised, 9 cycles/yr,
# 250 bar, 2023 prices -> x1.0384 = 0.27 GBP/kg (2024) / 39.39 kWh_HHV per
# kg = 6.9 GBP/MWh_H2 per unit of storage THROUGHPUT at the stated cycling.
# BINDING CONVENTION (normative): cost = throughput_MWh_H2 x 6.9 GBP, valid
# ONLY at cycling rates comparable to the stated 9/yr. This number MUST NOT
# be applied to a store cycling materially below that rate — a seasonal
# (~1 cycle/yr) store RE-OPENS THE CAPEX GAP AS A NAMED BLOCKER and new
# evidence must be ordered before such a scenario is costed (DEA remains
# cross-check-only per D1).
source = "h2_ts_2023"
levelised_gbp2024_per_kg = 0.27
levelised_gbp2024_per_mwh_h2_hhv = 6.9
cycles_per_year_assumed = 9
basis = "levelised cost, NOT capex; cycling convention binds"
binding_convention = "valid only near 9 cycles/yr; seasonal (~1/yr) stores re-open the capex gap as a named blocker (review condition 5)"

[storage.hydrogen.reconversion_ocht]
# EGC 2025 Annex A, OCHT 100 MW FOAK (100% hydrogen open-cycle turbine,
# 2030 commissioning, 2024 prices). The D4 discharge leg.
# EFFICIENCY (review condition 6): DEFAULT = 25% as published in Annex A
# (the government's number — opponent's-defaults discipline; conservative/
# higher-cost end, direction stated). The report's footnote 9 quotes ~35%
# (LHV) for 100% H2 turbines; ~35% LHV x 0.846 (H2 LHV/HHV ratio) =
# ~29.6% HHV — carried below as a MANDATORY labelled sensitivity that
# accompanies every OCHT-consuming result, with the annex-vs-footnote
# discrepancy stamped on the artefact. The Baringa H2P primary must be
# checked (one fetch) to resolve the basis BEFORE any OCHT-containing
# number is PUBLISHED.
# CHECKED 2026-07-06 (the condition-6 fetch, data engineer): Baringa for
# DESNZ, "Hydrogen to power: costs and barriers", published 14 Jan 2026,
# OGL v3.0 (gov.uk publication "Hydrogen to power: cost and technical
# assumptions"), pinned in data/packs/costs-evidence.sha256 (sha256
# f9bd4a95...92cd). Basis RESOLVED: p.33 — turbines already operating on
# 100% hydrogen are sub-100 MW industrial models optimised for durability,
# "around 35% (LHV)" rated, vs up to 42% for state-of-the-art large gas
# turbines (Table 11 p.40: typical gas OCGT central 38% LHV); OEMs expect
# 100%-H2 archetypes at gas-equivalent performance by the early 2030s.
# Baringa publishes NO 25% rated efficiency anywhere: Annex A's 25%
# "average fuel efficiency" is DESNZ's own duty-cycle average — a
# DIFFERENT OBJECT from the ~35% LHV (~29.6% HHV) rated basis. Default
# (25%, the government's number) and the mandatory labelled sensitivity
# are UNCHANGED; the publication_gate string update recording this
# resolution is PROPOSED to review, not applied (reviewed-act discipline). CCHT (50% blend, 900 MW): capex [1060,1170,1380],
# FOM 14,500, eff 51% HHV — recorded for the blend archetype.
source = "egc2025"
capex_gbp_per_kw = [750, 850, 950]        # predev 50 + construction [700,800,900]
infrastructure_gbp_per_kw = 53.0          # GBP 5.3m / 100 MW
fom_gbp_per_mw_yr = 19400
insurance_gbp_per_mw_yr = 1500
connection_gbp_per_mw_yr = 3100
vom_gbp_per_mwh = 5
efficiency_hhv_default = 0.25             # Annex A as published — the default
efficiency_hhv_sensitivity_labelled = 0.296  # ~35% LHV (report fn.9) x 0.846 — mandatory labelled sensitivity (review condition 6)
publication_gate = "Baringa H2P primary check required before any OCHT-containing number is published (review condition 6)"
life_years = 25
build_years = 2
predev_years = 2
predev_phasing = [0.56, 0.44]
build_phasing = [0.66, 0.34]
hurdle_rate = [0.085, 0.101, 0.120]

