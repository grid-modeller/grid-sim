# Current NESO frequency-response holdings — committed reference record for
# the Q8 current-holdings variant run (stage-6-part2-run-report.md §2
# consequence 1: the 2019-default headline "must NEVER be read as 'GB today
# cannot'; holdings are a spec input awaiting a current-holdings variant
# run"). Assembled 2026-07-03 (data engineer). Every number carries its
# citation; nothing here is fetched at build time. Evidence note:
# docs/notes/q8-current-holdings.md.
#
# Volumes are cleared (procured) MW from NESO's own Enduring Auction
# Capability (EAC) daily auctions, aggregated over NESO financial year 2025
# (EFA days 2025-04-01 .. 2026-03-31, 365 days x 6 four-hour EFA windows =
# 2,190 windows per product, no gaps). Raw snapshots + checksums:
# data/packs/response-holdings/ (fetched, not committed;
# data/packs/response-holdings.sha256 is the committed manifest).

schema = "response-holdings-reference-v1"
period = "FY2025 (2025-04-01 .. 2026-03-31)"
convention = "annual mean of EAC cleared volumes over FY2025"

