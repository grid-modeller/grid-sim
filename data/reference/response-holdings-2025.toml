# ---------------------------------------------------------------------------
# Low-frequency dynamic services — the services the Q8 survival model
# consumes (loss-of-infeed => under-frequency; the engine models dynamic
# droop services only, per the Q8 simulation contract).
#
# Field names below match grid_stability::pathway RawPathwayResponse
# (name, mw, delivery_factor, droop_full_deviation_hz, delay_s, ramp_s) so
# the [[assumptions.responses]] fragment is a mechanical transcription.
# The fy2025_* fields are evidence, not engine inputs.
#
# MODELLING CONVENTIONS (stated, same class as the 2019 event spec's):
# - Linear droop from 0 to droop_full_deviation_hz. The published curves
#   are piecewise linear with a +/-0.015 Hz deadband and, for DC/DM, a 5 %
#   knee (DC: 5 % at 0.2 Hz, 100 % at 0.5 Hz; DM: 5 % at 0.1 Hz, 100 % at
#   0.2 Hz; DR: linear from deadband, 100 % at 0.2 Hz) — Service Terms
#   delivery-parameter tables. The engine's single-parameter droop sits
#   AT OR ABOVE the published DC knee curve over the whole 0–0.5 Hz
#   range, meeting it only at saturation (linear gives 40 % at 0.2 Hz vs
#   the real 5 %); near the 48.8 Hz survival floor (deviation
#   1.2 Hz) all services are saturated, so the approximation affects the
#   arrest trajectory, not the saturated nadir balance. Direction:
#   optimistic (earlier response => larger survivable loss). Consistent
#   with the part-1 §2 "envelope fast mid-phase" caveat; no-retuning rule
#   untouched (2019 spec and constants unchanged).
# - delay_s = TiMAX (max initiation time), ramp_s = ramp-time upper bound
#   (TdMAX - TiMAX): contract maxima used as actuals, the same convention
#   as the 2019 spec's Grid-Code envelope timings.
# - No sustain_s: contracted delivery durations (DC 15 min / DM 30 min /
#   DR 60 min, NESO dynamic-services page) all exceed the 120 s Q8 window.
# - delivery_factor = 1.0 (contract assumption). NESO publishes no
#   event-measured delivery factor for the EAC suite (no performance-
#   monitoring dataset on the portal, checked 2026-07-03); the 2019 spec
#   uses measured factors (0.67–1.0), so the 2019-vs-current comparison is
#   contract-vs-measured on this axis — an asymmetry favouring current
#   holdings. Quantify by sensitivity, not by inventing a factor.
# ---------------------------------------------------------------------------

[[services]]
name = "dynamic_containment_lf"          # EAC product DCL (post-fault)
mw = 1178                                # FY2025 mean cleared volume, 1178.2 MW
delivery_factor = 1.0
droop_full_deviation_hz = 0.5            # saturation fs = fn +/- 0.5 Hz (Service Terms)
delay_s = 0.5                            # TiMAX (Service Terms; NESO service page)
ramp_s = 0.5                             # TdMAX 1 s - TiMAX 0.5 s
fy2025_mean_mw = 1178.2
fy2025_min_mw = 817
fy2025_p5_mw = 884
fy2025_p95_mw = 1405
fy2025_max_mw = 1646
fy2025_monthly_mean_range_mw = [1006, 1292]  # Jan 2026 low, Apr 2025 high —
                                         # inverse-seasonal (more DC held in
                                         # low-inertia summer)
june_2026_mean_mw = 1244                 # recency cross-check, current snapshot

[[services]]
name = "dynamic_moderation_lf"           # EAC product DML (pre-fault, fast)
mw = 416                                 # FY2025 mean cleared volume, 416.2 MW
delivery_factor = 1.0
droop_full_deviation_hz = 0.2            # saturation fs = fn +/- 0.2 Hz
delay_s = 0.5                            # TiMAX
ramp_s = 0.5                             # TdMAX 1 s - TiMAX 0.5 s
fy2025_mean_mw = 416.2
fy2025_min_mw = 44
fy2025_p5_mw = 295
fy2025_p95_mw = 530
fy2025_max_mw = 533
fy2025_monthly_mean_range_mw = [276, 515]  # requirement stepped UP through
                                         # FY2025 (Apr 2025 low, Feb 2026
                                         # high); June 2026 mean 500 MW —
                                         # the annual mean understates the
                                         # going-forward DM holding
june_2026_mean_mw = 500

[[services]]
name = "dynamic_regulation_lf"           # EAC product DRL (pre-fault, slow)
mw = 461                                 # FY2025 mean cleared volume, 460.8 MW
delivery_factor = 1.0
droop_full_deviation_hz = 0.2            # saturation fs = fn +/- 0.2 Hz
delay_s = 2.0                            # TiMAX (2 s standalone)
ramp_s = 8.0                             # TdMAX 10 s - TiMAX 2 s
fy2025_mean_mw = 460.8
fy2025_min_mw = 210
fy2025_p5_mw = 377
fy2025_p95_mw = 480
fy2025_max_mw = 494
fy2025_monthly_mean_range_mw = [404, 480]
june_2026_mean_mw = 480

# ---------------------------------------------------------------------------
# Recorded but EXCLUDED from the engine fragment, with reasons.
# ---------------------------------------------------------------------------

[excluded.high_frequency_products]
# Over-frequency services — not consumed by a loss-of-infeed survival run.
reason = "high-frequency (over-frequency) response; Q8 models under-frequency loss events"
fy2025_mean_mw = { DCH = 1120.8, DMH = 432.8, DRH = 492.7 }

[excluded.static_ffr]
# Static FFR: still procured daily (reform consultation open Nov 2025, not
# ceased). Triggered/latched at a set frequency — the engine rejects static
# latched services at parse by design (they break the Q8 bisection's
# state-free-dynamics argument; part-2 report §5). Exclusion is
# CONSERVATIVE: ~202 MW of real low-frequency response is not credited.
fy2025_mean_mw = 202
fy2025_min_mw = 50
fy2025_max_mw = 255
fy2025_windows_procured = "2190 of 2190 (procured in every EFA window)"
source = "sources.sffr_auction_results"
reason = "static latched service; rejected at parse by documented engine design"

[excluded.mandatory_frequency_response]
# MFR persists (Ofgem derogation 2025-04-01 .. 2029-12-31) as the residual
# obligation on large synchronous generators in frequency-sensitive mode.
# NESO publishes NO per-period MFR holding volumes on the Data Portal
# (searched 2026-07-03: only historic FFR post-tender reports). Unquantified
# residual — direction conservative (real holdings >= the modelled ones).
volume_mw = "not published"
source = "sources.ofgem_mfr_derogation"
reason = "no NESO primary source for procured volume; excluded rather than estimated"

[excluded.reserve_products]
# Quick Reserve / Slow Reserve / Balancing Reserve (EAC products NQR/PQR/
# NSR/PSR/NBR/PBR) are BM-instructed reserve, not frequency-triggered droop
# response — outside the survival model's service set.
reason = "dispatched by instruction, not frequency-proportional; not a droop service"

