# The 9 August 2019 GB frequency event — committed reference record for the
# Stage 6 acceptance test (docs/04: "Reproduce a documented GB event ... on
# nadir given published system conditions"). Assembled 2026-07-03 (data
# engineer). Every number carries its citation; nothing here is fetched at
# build time. Tolerance evidence: docs/notes/stage-6-evidence-report.md.
#
# Page references are to the printed page numbers of the source PDFs.
# All clock times are BST (UTC+1); UTC equivalents given for the anchors the
# engine consumes (docs/02 ADR-3: internal time is UTC).

