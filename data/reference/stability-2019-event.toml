# ---------------------------------------------------------------------------
# Response deployment through the event (ESO timeline, pp.13-14).
# ---------------------------------------------------------------------------

[response_deployment]
delivered_650_mw_by = "16:52:44"    # "at least 650MW"
delivered_900_mw_by = "16:53:04"
all_response_delivered_by = "16:53:31"
stor_instructed_mw = 400            # "Since 16:53 ... overall amount 400MW"
control_room_actions_mw = 1240      # by 16:57:15: "over 1,000MW of response and a
                                    # further 1240MW of control room actions"

# ---------------------------------------------------------------------------
# LFDD outcome. Three published figures measure different things — do not
# mix them (see stage-6-evidence-report.md §3).
# ---------------------------------------------------------------------------

[lfdd]
stage_triggered = 1
trigger_hz = 48.8
demand_disconnected_dno_mw = 931    # ESO §4.3 (p.22): "The DNO's have indicated that
                                    # 931MW (3.2%) of demand was automatically
                                    # disconnected" (slightly below the 5% design block)
demand_disconnected_net_mw = 892    # Ofgem 2.4.12 (p.19): "892MW of net demand was
                                    # disconnected in total from the local distribution
                                    # networks"
net_reduction_seen_at_transmission_mw = 350  # Ofgem 2.4.13 (p.19): "the net demand
                                    # reduction seen by the transmission system was only
                                    # 350MW. This indicates that approximately 550MW of
                                    # additional distributed generation was lost at this
                                    # point."
customers_disconnected = 1100000    # "c.1.1m customers (c. 1GW)" (ESO p.11)
all_demand_restored_by = "17:37"    # ESO timeline p.14
sp_distribution_erroneous_mw = 22   # E3C final p.24 fn.4: SPD disconnected 22 MW at
                                    # 48.8 Hz on an incorrect LFDD relay setting (SPT
                                    # area first stage is 48.5 Hz)

# LFDD stage table, England & Wales (NGET area) — E3C final report, Annex A
# Table 1 (p.24). SPT/SHET areas start at stage 5/4 respectively; totals:
# NGET 60%, SPT 40%, SHET 40% of demand.
lfdd_stages_england_wales = [
  { stage = 1, hz = 48.80, percent_demand = 5.0 },
  { stage = 2, hz = 48.75, percent_demand = 5.0 },
  { stage = 3, hz = 48.70, percent_demand = 10.0 },
  { stage = 4, hz = 48.60, percent_demand = 7.5 },
  { stage = 5, hz = 48.50, percent_demand = 7.5 },
  { stage = 6, hz = 48.40, percent_demand = 7.5 },
  { stage = 7, hz = 48.20, percent_demand = 7.5 },
  { stage = 8, hz = 48.00, percent_demand = 5.0 },
  { stage = 9, hz = 47.80, percent_demand = 5.0 },
]

# ---------------------------------------------------------------------------
# The counterfactual pin (second acceptance anchor): the ESO's own
# simulation of a 1,000 MW loss under 9 August conditions.
# ---------------------------------------------------------------------------

[counterfactual_1000mw]
# ESO report p.24 (Appendix I summary): "Two simulations have been carried
# out for a loss of 1,000MW using the same inertia and demand ... In both
# cases the frequency does not go below 49.5Hz". Corroborated by outturn:
# 1 July 2019, NEMO tripped at 1,000 MW import (28 GW demand, 201 GVA.s,
# 1,087 MW response held) and "frequency remains above 49.5Hz" (Table 4 and
# Figure 11, pp.24-25).
loss_mw = 1000
min_frequency_floor_hz = 49.5
comparison_day = 2019-07-01
comparison_day_inertia_gva_s = 201
comparison_day_demand_gw = 28
comparison_day_response_mw = 1087

# ---------------------------------------------------------------------------
# Operating standards — at the event, and current (for Stage 6 limit checks).
# ---------------------------------------------------------------------------

[standards_2019]
rocof_relay_limit_hz_per_s = 0.125  # legacy loss-of-mains setting; "the ESO must keep
                                    # the RoCoF at less than 0.125Hz/s to prevent loss
                                    # of this generation", ~2 GW connected via such
                                    # relays (ESO appendices, "Managing Rate of Change
                                    # of Frequency")
statutory_range_hz = [49.5, 50.5]
sqss_normal_infeed_loss_mw = 1320   # SQSS Normal Infeed Loss Risk (freq must stay
                                    # within 49.5-50.5 Hz); GSR015 decision (Ofgem 2014)
sqss_infrequent_infeed_loss_mw = 1800 # SQSS Infrequent Infeed Loss Risk since
                                    # 2014-04-01 (freq >= 49.2 Hz, restored to 49.5
                                    # within 60 s)
largest_loss_typical_mw = [1260, 1000] # Sizewell B / single interconnector (ESO
                                    # appendices, "What determines RoCoF?")
inertia_floor_gva_s = 140           # ESO operational floor cited in Kraljic (arXiv
                                    # 2210.03661, Fig. 3) for 2020-22; NG ESO policy
                                    # pre-FRCR-2023

[standards_current]
# ALoMCP (post-event programme, ENA/NG ESO): loss-of-mains RoCoF relays
# re-set to 1.0 Hz/s with 500 ms definite time delay; vector-shift LoM
# protection removed; compliance deadline 2022-08-31.
rocof_relay_limit_hz_per_s = 1.0
rocof_relay_delay_s = 0.5
alomcp_deadline = 2022-08-31
# FRCR 2024 (NESO): minimum inertia requirement reduced 140 -> 130 GVA.s
# (2024-02-28) -> 120 GVA.s (2024-06-19) (p.10); 2025 ambition 102 GVA.s,
# "based on an assumed largest loss of 1800 MW and ensures the Rate of
# Change of Frequency (RoCoF) remains within 0.5 Hz/s" (p.10). Residual
# legacy relay tranches post-ALoMCP: 20-90 MW at 0.125 Hz/s, 10-40 MW at
# 0.2 Hz/s (p.14). Risk appetite: 1-in-30-year 48.8 Hz (LFDD) event (p.6).
min_inertia_gva_s = 120
min_inertia_ambition_2025_gva_s = 102
design_rocof_limit_hz_per_s = 0.5
largest_loss_planning_mw = 1800
lfdd_stage1_hz = 48.8
sqss_infrequent_loss_floor_hz = 49.2  # FRCR 2024 impact level L1 (p.8):
                                    # 49.2 <= f < 49.5 Hz for max 60 s is the
                                    # current SQSS/SOGL standard. NOTE: docs/04
                                    # Stage 6 says "49.2 Hz LFDD" — LFDD is 48.8 Hz;
                                    # 49.2 Hz is the SQSS infrequent-loss floor.
                                    # Flagged in stage-6-evidence-report.md, not
                                    # silently corrected.
