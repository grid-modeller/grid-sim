# ---------------------------------------------------------------------------
# Pre-event system conditions — the inputs the Stage 6 engine takes.
# ---------------------------------------------------------------------------

[pre_event]
# ESO technical report p.10 (§3.1): "approximately 32GW of transmission
# connected generation capacity available ... Over 30% of this capacity was
# being provided by wind generation with an expected peak output of 10GW,
# and 50% was being provided by conventional units. ... The overall demand
# was forecast to reach 29GW".
transmission_generation_available_gw = 32.0
wind_capacity_share = 0.30
demand_gw = 29.0                    # ESO report Table 4 (p.24): "Demand ... 29 GW"

# System inertia. Two published values for the same moment:
#  - ESO report Table 4 (p.24): "Inertia ... 210GVAs" (comparison table vs
#    1 July 2019: 201 GVAs, demand 28 GW).
#  - ESO appendices, Appendix M Q42 (ESO answers to E3C): estimate
#    "immediately prior to the trip" at 16:52 = 219,632 MVA.s. Q42 also
#    states: "The ESO does not currently measure system inertia directly
#    but instead estimates it using a model."
# The ~5% spread between the two official figures is itself tolerance
# evidence (see stage-6-evidence-report.md §3).
inertia_gva_s = 210.0               # headline (Table 4)
inertia_gva_s_appendix_q42 = 219.632 # per-timestamp estimate, 16:52

largest_secured_infeed_mw = 1000    # ESO report timeline 16:52:26 (p.13): "ESO
                                    # securing for a loss of power infeed of
                                    # 1000MW"; appendices Appendix H: largest
                                    # single infeed loss on the day was a
                                    # 1,000 MW interconnector; "Typically, this
                                    # loss will be Sizewell (1,260 MW) or an
                                    # interconnector (1,000 MW)".

# Frequency response being held (ESO report p.25): "the amount of low
# frequency response being held was 1,022MW primary and 1,314MW secondary".
# Of validated holdings, 89% of primary (841MW) and 88% of secondary
# (1055MW) "performed as expected" (p.25). Minimum dynamic response
# requirement at the time: 550 MW (appendices, "Response provision").
response_primary_mw = 1022
response_secondary_mw = 1314
response_primary_validated_delivered_mw = 841
response_secondary_validated_delivered_mw = 1055
min_dynamic_response_requirement_mw = 550

# Battery contribution called out in the ESO summary (p.4): response and
# reserve "included 472MW of battery storage".
battery_response_mw = 472

# ---------------------------------------------------------------------------
# Infeed losses — ESO technical report Table 2 (p.14), the authoritative
# cumulative-loss table. Ofgem variants noted per entry.
# ---------------------------------------------------------------------------

[[losses]]
name = "little_barford_st1c"
mw = 244
cumulative_mw = 244
time_local = "16:52:34"
mechanism = "steam turbine speed-sensor discrepancy -> automatic shutdown (Ofgem 2.4.4, p.17)"
# NOTE: early accounts gave the ST loss as ~640 MW; the final record is
# 244 MW for the ST, with Little Barford's TOTAL staged loss = 641 MW
# (244 + 210 + 187; Ofgem 3.27, pp.30-31: "brought the total loss of
# generation to 641MW").

[[losses]]
name = "hornsea_one"
mw = 737
cumulative_mw = 981
time_local = "16:52:33.835"
mechanism = "voltage-control instability after transmission fault; deloaded 799 MW -> 62 MW (ESO timeline p.13; Ofgem 2.4.3, p.17)"

[[losses]]
name = "embedded_vector_shift"
mw = 150
cumulative_mw = 1131
time_local = "16:52:33"
mechanism = "loss-of-mains vector-shift protection at the transmission fault (ESO Table 2, p.14; estimated)"

[[losses]]
name = "embedded_rocof"
mw = 350
cumulative_mw = 1481
time_local = "16:52:34"
mechanism = "loss-of-mains RoCoF protection, legacy 0.125 Hz/s setting (ESO Table 2, p.14; estimated)"
# Ofgem 2.4.6 (pp.17-18): "an estimated 350-430MW of distributed generation
# tripped off"; Ofgem footnote 19 (p.18): inferred from a "500MW increase in
# transformer loadings"; "total loss of distributed generation from vector
# shift and RoCoF could have been up to 580MW". Range, not a point value.
mw_range_ofgem = [350, 430]
mw_total_lom_upper_ofgem = 580

[[losses]]
name = "little_barford_gt1a"
mw = 210
cumulative_mw = 1691
time_local = "16:53:31"
mechanism = "generator protection trip, excess steam pressure (ESO timeline p.14; Ofgem 2.4.10, p.18)"

[[losses]]
name = "embedded_under_frequency_49hz"
mw = 200
cumulative_mw = 1891   # not in ESO Table 2 (which sums infeed trips to 1,878 without this)
time_local = "~16:53:35"
mechanism = "under-frequency protection at 49 Hz; NET effect modelled from the trace (ESO p.22: 'The net effect of this disconnection has been modelled as a 200MW loss of generation. Protection operating at this frequency was not expected'); Ofgem 2.4.11 (p.18): net of known demand disconnections (trains, industrials)"

[[losses]]
name = "little_barford_gt1b"
mw = 187
cumulative_mw = 2078
time_local = "16:53:58"
mechanism = "manual trip by plant staff on safety grounds, after LFDD (Ofgem 2.4.15, p.19); 'subsumed by the LFDD reductions' (ESO timeline p.14)"

[losses_totals]
eso_table2_total_mw = 1878          # ESO Table 2 (p.14): infeed trips only, excl. the 200 MW @49Hz
ofgem_cumulative_min_mw = 1990      # Ofgem 2.4.11 (p.18): "at least 1,990MW" incl. 200 MW @49Hz
secured_events_total_mw = 1528      # appendices Appendix H: Hornsea 737 + Little Barford 641 +
                                    # vector shift 150 = 1528 MW "significantly in excess of the
                                    # level secured for (1,000MW)"
largest_secured_infeed_mw = 1000
# The acceptance anchor: total loss ~1.9x the largest secured infeed.

# ---------------------------------------------------------------------------
# Frequency anchors. Official values from the ESO timeline (pp.13-14);
# measured values computed from the NESO 1-second frequency data
# (sources.neso_frequency_data; 1 Hz sampling, so the true instantaneous
# extremum can sit slightly below the sampled minimum).
# ---------------------------------------------------------------------------

[frequency]
nominal_hz = 50.0
pre_event_hz = 50.0                 # ESO timeline 16:52:26: "Frequency at 50.0Hz"
pre_event_hz_measured = 49.995      # NESO 1-s data at 16:52:33 BST
first_arrest_hz = 49.1              # ESO timeline 16:52:58: "Frequency drop is arrested at 49.1Hz"
first_arrest_hz_measured = 49.083   # NESO 1-s data, minimum of first phase, at 16:52:59 BST
plateau_hz = 49.2                   # ESO timeline 16:53:18: "Frequency recovers to 49.2Hz"
lfdd_trigger_hz = 48.8              # ESO timeline 16:53:49.398: "Frequency breaches 48.8Hz trigger level"
nadir_hz_measured = 48.787          # NESO 1-s data at 16:53:49 BST; only 1 sample < 48.8
recovery_49_hz_measured = "16:54:14" # first 1-s sample >= 49.0 after nadir
recovery_49_5_hz_measured = "16:55:00"
restored_50_hz = "16:57:15"         # ESO timeline: "Frequency returns to 50Hz"
# E3C final report p.14: "The LFDD scheme enabled the frequency to recover
# to 48.9 Hz before the loss of the second gas turbine"; Ofgem 2.4.14
# (p.19): frequency recovered above 48.8 Hz "within 200ms" of LFDD.

[frequency.rocof_measured]
# Computed from the NESO 1-s trace. RoCoF is window-definition dependent;
# the convention is pinned here for reproducibility. Windows START AT THE
# 16:52:34 BST SAMPLE (f = 49.921 Hz) — the first whole-second sample after
# the 16:52:33.490 fault, coincident with the t+1s ST1C trip:
#   mean_first_2s  = (f(16:52:34) - f(16:52:36)) / 2 = (49.921 - 49.633)/2
#   mean_first_10s = (f(16:52:34) - f(16:52:44)) / 10
#   max_1s         = max consecutive-sample drop in the descent
#                    (16:52:34 -> 16:52:35, 49.921 - 49.770)
window_start_local = "16:52:34"
max_1s_hz_per_s = 0.151
mean_first_2s_hz_per_s = 0.144
mean_first_10s_hz_per_s = 0.065
# Cross-check vs published inertia: f0*dP/(2*E) with E = 219.6 GVA.s gives
# 0.129 Hz/s for the 1,131 MW cumulative loss and 0.169 Hz/s for 1,481 MW —
# the measured 0.14-0.15 Hz/s sits inside, consistent with the staged loss
# plus load damping.

[frequency.event_times_utc]
# UTC equivalents of the anchor timestamps (BST - 1h), for the engine.
fault = "2019-08-09T15:52:33.490Z"
first_arrest = "2019-08-09T15:52:58Z"
gt1a_trip = "2019-08-09T15:53:31Z"
lfdd_trigger = "2019-08-09T15:53:49.398Z"
gt1b_trip = "2019-08-09T15:53:58Z"
restored_50hz = "2019-08-09T15:57:15Z"
seconds_fault_to_lfdd = 75.9

