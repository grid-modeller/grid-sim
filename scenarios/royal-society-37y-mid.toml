# Royal-Society-style 37+-year storage scenario, MID SUPPLY VARIANT
# (Stage 3 part 2): the third pinned point on the overbuild curve,
# quoted in the stage-3 run report (docs/notes/
# stage-3-storage-run-report.md) and therefore pinned per the
# published-number rule (docs/05). Identical to
# scenarios/royal-society-37y.toml in every respect except the three
# weather-driven capacities, scaled to 0.85x the headline file's
# fleet: offshore 204 GW / onshore 68 GW / solar 170 GW. At the
# calibrated 2024 mean CFs this is ~932 TWh/yr of wind + solar
# potential = ~1.64x the ~570 TWh/yr demand (headline ~1.92x, lean
# ~1.35x).
#
# THE OVERBUILD CURVE (a Stage 3 finding) -- measured on the full
# 1985-2024 record (2026-07-03), scaling all three capacities of the
# headline file:
#   0.60x -> INFEASIBLE (no store size reaches zero unserved at the
#            10^6 GWh solver cap: annual supply no longer covers annual
#            demand after conversion losses -- the cliff)
#   0.70x -> 58,432 GWh  (scenarios/royal-society-37y-lean.toml; pinned)
#   0.85x -> 28,336 GWh  (THIS FILE; pinned)
#   1.00x -> 23,872 GWh  (scenarios/royal-society-37y.toml; pinned)
# A single point understates the finding; the curve IS the finding.
#
# RS-COMPARABILITY (verified against the published report,
# "Large-scale electricity storage", Royal Society, 2023 -- anchors in
# the stage-3 run report): the RS report sized wind + solar supply at
# 1.23-1.40x annual demand. THIS FILE (~1.64x) is ABOVE that range: an
# intermediate point on the overbuild curve, not an RS-comparable
# case. The RS-comparable point is the lean file (~1.35x).
#
# All other assumptions (demand tiling and 2.177 scale, hydrogen store
# 100 GW / eta 0.40, initial-SoC-full with the year-1 burn-in guard,
# rule-based policy) are documented in the headline file's header and
# unchanged here.

schema_version = 8   # v8: version line only (no heating resource_depth_m set; docs/03 migration)
name = "royal-society-37y-mid"
description = "Mid-supply (0.85x) variant of royal-society-37y: wind + solar + hydrogen only vs 1985-2024 at ~570 TWh/yr demand -- the third pinned point on the overbuild curve (~1.64x demand -- above the RS report's verified 1.23-1.40x sizing range; an intermediate curve point, not an RS-comparable case)"

[horizon]
start = "1985-01-01T00:00:00Z"   # 701,280 half-hourly periods
end   = "2024-12-31T23:30:00Z"
weather_years = "all"

[[zones]]
id = "GB"

[zones.demand]
# 2024 profile tiled over 1985-2024; scale documented in the headline file.
annual_scale = 2.177             # 261.83 TWh x 2.177 = 570.00 TWh
column = "underlying_demand"     # D3 total-generation convention
base_profile = [
