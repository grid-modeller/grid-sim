# --- The hydrogen store (the solve's designated store) ---

[[zones.storage]]
kind = "hydrogen"
power_gw = 100.0                 # generous symmetric rating (flagged)
energy_gwh = 100000.0            # 100 TWh fixed-run value; `solve` sizes this
round_trip_efficiency = 0.40     # ~0.74 electrolysis x ~0.54 reconversion
dispatch_order = 1

[dispatch]
policy = "rule_based"            # D4; the LP comparison arrives in Stage 7

[solver]
mode = "min_storage_for_zero_unserved"
