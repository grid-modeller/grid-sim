# =====================================================================
# NO2 — hydro + load only (D5): the seasonal-budget reservoir model.
# =====================================================================

[[zones]]
id = "NO2"

[zones.demand]
base_profile = "data/packs/entsoe-2024/processed/load_no2_2024.parquet"
column = "load_mw"
annual_scale = 1.0
# Identity wedge: supply 55.28 (budget 43.67 + RoR 7.09 + wind 4.52) -
# load 36.08 - NSL net 9.92 = +9.29 TWh -> +1.057 GW: NO2's non-GB net
# exports (NordLink/Skagerrak/NorNed and internal NO1/NO5 transfers,
# out of scope) net of the dropped fossil gas 0.08 + waste 0.04 TWh.
extra_demand_gw = 1.057

# D11 (schema v7): per-zone SRMC chain, external-zone basis
# (docs/notes/d11-per-zone-price-data-report.md): carbon = flat 2024
# EUA mean £55.01/tCO2 (prices-eu-2024.toml [carbon.eua]; no CPS
# analogue outside GB; no licence-clean daily EUA series exists, so a
# flat annual mean is the committed convention); gas = the GB daily
# SAP series (the licence-forced GB-SAP fallback, ~3.3% of TTF —
# report §3, best-case gas treatment for the ladder).
[zones.pricing]
reference = "data/reference/prices-2024.toml"
carbon_flat_gbp_per_tco2 = 55.01

# No priced technology: NO2 is ~100% hydro; its price is a water
# value this fuel-SRMC recipe does NOT capture (report §4 — the wedge
# never binds; consistent with the Module 5 NO2-flat result). Its
# rungs price at the £0 must-take floor under the ladder.

[[zones.fleet]]
technology = "hydro"
capacity_gw = 10.338          # A68 no2 B12 reservoir 9.816 + B10 pumped 0.522
# The D5 seasonal-budget reservoir model (engine: grid-adequacy
# multizone module, step 4): weekly (336-period) energy budgets = the
# zone's OBSERVED 2024 reservoir + pumped generation (A75; 42.56 +
# 1.11 TWh; pumped recharge ignored — the pack report §6 inflow-proxy
# convention). Dispatch within the budget is greedy against zone
# scarcity (which NSL couples to GB's). NEAR-TAUTOLOGY, owned (D5
# ruling b / docs/04 A3): with observed-generation budgets the hydro
# seasonality is reproduced by construction — the A3 gate content is
# the FLOW structure, not the budget shape.
[zones.fleet.energy_budget]
trace = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["hydro_reservoir", "hydro_pumped"]
window_periods = 336

[[zones.exogenous_supply]]
label = "no2_ror"
# Observed A75 run-of-river (7.09 TWh on 1.409 GW): must-take, not
# dispatchable. gb-grid-margin: hydro is firm.
path = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["hydro_ror"]
reliability = "firm"

[[zones.exogenous_supply]]
label = "no2_wind"
# NO2 wind 4.52 TWh on 1.447 GW — 12.5 % of NO2 load and 47 % of the
# NSL net flow. D5 condition: absorbed EXPLICITLY in the zone energy
# balance — carried as the observed A75 trace (the "derived trace"
# option of the D5 note), never silently dropped. v1 has no NO2 wind
# CF derivation (weather pack covers NO2 for temperature only).
path = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["wind_onshore"]
reliability = "variable"

# =====================================================================
# DK1 — wind-heavy Viking counterparty. A68 lists ONLY wind/solar for
# DK1 (no thermal rows), so the zone is traces + load + wedge.
# =====================================================================

[[zones]]
id = "DK1"

[zones.demand]
base_profile = "data/packs/entsoe-2024/processed/load_dk1_2024.parquet"
column = "load_mw"
annual_scale = 1.0
# Identity wedge: trace supply 17.92 - load 22.59 - Viking net 3.74 =
# -8.40 TWh -> -0.957 GW constant supply credit. Components, cited
# (aggregation_gen_2024 dk1): local thermal with no A68 capacity rows
# (hard coal 2.27, biomass 1.70, gas 1.28, waste 0.50, oil 0.16 TWh =
# 5.93 TWh — the decentralised/central CHP fleet) plus DK1's net
# non-GB imports (Skagerrak/Konti-Skan/COBRA/DE borders, out of scope)
# ~2.5 TWh. LIMITATION, stated: DK1 is a transit hub; a constant
# cannot transit, so Viking's modelled flow is DK1's own weather
# balance only (its r ~ 0 vs GB wind is a reported diagnostic, not a
# gate — docs/04 A3).
extra_demand_gw = -0.957

# D11 (schema v7): per-zone SRMC chain, external-zone basis
# (docs/notes/d11-per-zone-price-data-report.md): carbon = flat 2024
# EUA mean £55.01/tCO2 (prices-eu-2024.toml [carbon.eua]; no CPS
# analogue outside GB; no licence-clean daily EUA series exists, so a
# flat annual mean is the committed convention); gas = the GB daily
# SAP series (the licence-forced GB-SAP fallback, ~3.3% of TTF —
# report §3, best-case gas treatment for the ladder).
[zones.pricing]
reference = "data/reference/prices-2024.toml"
carbon_flat_gbp_per_tco2 = 55.01

# No priced technology: DK1's modelled fleet is entirely
# weather-driven (its local thermal lives in the identity wedge), so
# nothing dispatches on an SRMC here.

[[zones.fleet]]
technology = "onshore_wind"
capacity_gw = 4.112           # A68 dk1 B19
capacity_factor_trace = "data/packs/cf-eu/dk1/dk1_onshore_cf_2024.parquet"
# Calibration factor 0.7441 is a band-edge keep (old-stock fleet vs
# modern-fleet power curve) — flag carried per eu-cf-review ruling 4.

[[zones.fleet]]
technology = "offshore_wind"
capacity_gw = 1.601           # A68 dk1 B18
capacity_factor_trace = "data/packs/cf-eu/dk1/dk1_offshore_cf_2024.parquet"

[[zones.fleet]]
technology = "solar"
capacity_gw = 2.738           # A68 dk1 B16
capacity_factor_trace = "data/packs/cf-eu/dk1/dk1_solar_cf_2024.parquet"

# =====================================================================
# IE-SEM — all-island single market; predominantly a GB export sink
# (GB exports in 87.7 % of 2024 periods).
# =====================================================================

[[zones]]
id = "IE-SEM"

[zones.demand]
base_profile = "data/packs/entsoe-2024/processed/load_ie_2024.parquet"
column = "load_mw"
annual_scale = 1.0
# Identity wedge: supply 27.89 (gas 10.42 + coal 1.08 + oil 1.62 +
# onshore 5.9 GW x CF 0.285 = 14.77 with the review-directed capacity;
# note the trace x 5.9 GW reads +1.4 TWh above the A75 13.37 anchor) -
# load 40.89 - GB border net (-5.17, i.e. +5.17 TWh INTO IE) =
# -7.82 TWh -> -0.890 GW constant supply credit. Components, cited:
# unrepresented A75 categories (hydro RoR 0.70, peat 0.46, pumped gen
# 0.33, other 0.03 TWh) plus SEM embedded generation invisible to the
# platform (solar ~1 GW, small CHP) — the A65-load-vs-A75-generation
# gap. GB-only interconnection: no non-GB term (Celtic not yet
# commissioned).
extra_demand_gw = -0.890

# D11 (schema v7): per-zone SRMC chain, external-zone basis
# (docs/notes/d11-per-zone-price-data-report.md): carbon = flat 2024
# EUA mean £55.01/tCO2 (prices-eu-2024.toml [carbon.eua]; no CPS
# analogue outside GB; no licence-clean daily EUA series exists, so a
# flat annual mean is the committed convention); gas = the GB daily
# SAP series (the licence-forced GB-SAP fallback, ~3.3% of TTF —
# report §3, best-case gas treatment for the ladder).
[zones.pricing]
reference = "data/reference/prices-2024.toml"
carbon_flat_gbp_per_tco2 = 55.01

[zones.pricing.fuel_price.gas]
path = "data/packs/2024/processed/gas_sap_daily_2024.parquet"
column = "sap_gbp_per_mwh_hhv"

[zones.pricing.srmc.ccgt]
fuel = "gas"
efficiency = "ccgt"

# The IE "ocgt" entry is the oil peaker fleet (D5 ruling e) priced at
# the gas-OCGT SRMC — the data package's stated gas-only-recipe
# approximation (report §4/§5); an unpriced rung ABOVE the priced gas
# rung would invert the ladder's SRMC-proxy order, which the priced
# curve validation refuses.
[zones.pricing.srmc.ocgt]
fuel = "gas"
efficiency = "ocgt"

[[zones.fleet]]
technology = "ccgt"
capacity_gw = 5.814           # A68 ie B04

[[zones.fleet]]
technology = "coal"
capacity_gw = 1.369           # A68 ie B05 (Moneypoint)
[zones.fleet.availability]
flat = 0.0898                 # A75 ie hard coal 1.08 TWh / (1.369 x 8784)

[[zones.fleet]]
technology = "ocgt"
capacity_gw = 1.588
# A68 ie B06 fossil_oil 1.59 GW mapped to a peaker technology — D5
# ruling (e): material for a ~4.7 GW-average-load zone, never silently
# dropped. Observed 1.62 TWh (distillate/HFO units run as peakers and
# tertiary reserve).

[[zones.fleet]]
technology = "onshore_wind"
capacity_gw = 5.900
# NOT A68 (stale 3.0 GW) — the ~5.9 GW all-island fleet; see the
# capacity-source table in the header (eu-cf-review rulings 1/3).
capacity_factor_trace = "data/packs/cf-eu/ie/ie_onshore_cf_2024.parquet"

