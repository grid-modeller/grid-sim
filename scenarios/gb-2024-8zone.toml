# GB 2024 COMPOSED scenario — the 3-zone GB boundary family (N-Scotland /
# S-Scotland / E+W with B4 + B6) JOINED to the 5-zone external set (FR,
# CONT-NW, NO2, DK1, IE-SEM). The D13 composed boundary-trade measurement
# scenario: the named resolver for the D11 sweep quoting caveat (e) —
# does the 60 GW export/capture finding survive when northern wind must
# cross the measured Scotland–England constraints to reach the
# interconnector landing points?
#
# DESIGN (adopted 2026-07-05): docs/notes/d13-composed-boundary-trade.md;
# adjudication docs/notes/d13-composed-boundary-trade-review.md
# (ADOPT-WITH-EDITS, all nine edits applied). ADR-7 note: the committed
# 3-zone obligation (6) kept GB-internal and continental multizone as
# SEPARATE families in v1; this file is the proposed v2 JOIN as a NEW
# family — both committed families and all their pins stay untouched.
#
# ===================================================================
# COMPOSITION RULE (design rule 1 — a composition of committed data
# ONLY; no new data, no re-derivation)
# ===================================================================
# - NSCO / SSCO / RGB: value-identical to the committed
#   scenarios/gb-2024-3zone.toml (fleet, demand splits, exogenous
#   scales, storage, zonal CF traces, B4+B6 links) — every number
#   traceable to the three-zone data report and its six binding
#   obligations, which carry over verbatim. TWO stated departures, both
#   the exact surgery the 5-zone file performed on the GB reference:
#     1. the exogenous `net_imports` blocks are REMOVED (SSCO's intirl
#        column; RGB's nine-column block) — external trade is modelled
#        through [[links]] below, so the observed traces must not be
#        double-carried;
#     2. each GB zone gains the committed GB [zones.pricing] SRMC chain
#        (reference prices-2024.toml + daily gas SAP + ccgt/ocgt
#        efficiency keys — the chain the D11 review §C verified
#        bit-identical to the single-zone reference chain), restricted
#        per zone to its own SRMC-bearing fleet because the schema-v7
#        validator requires srmc entries to name THIS zone's fleet:
#        NSCO lists srmc.ccgt (Peterhead), SSCO lists none (no gas
#        plant between B4 and B6), RGB lists srmc.ccgt + srmc.ocgt.
#        The CHAIN is identical in all three zones; this is a metric
#        prerequisite (design rule 5, basis (A)), not new data.
# - FR / CONT-NW / NO2 / DK1 / IE-SEM: byte-identical to the committed
#   scenarios/gb-2024-5zone.toml entries (demand, wedges,
#   extra_profiles, calibrated fleets, energy budgets, v7 pricing
#   blocks). All comments and citations live in that file and its data
#   reports; they are not duplicated here.
#
# ===================================================================
# LANDING-POINT MAPPING (design rule 2 — the load-bearing geometry;
# committed citations carried)
# ===================================================================
# The committed 3-zone EXTERNAL INTERCONNECTORS convention (design-
# review item 7) assigns every built link a GB landing zone: "Moyle
# lands at Auchencrosh 275 kV (Ayrshire, SPT, south of B4) ->
# S-Scotland gets the FUELHH intirl column; every other built link
# lands in England/Wales -> E+W (RGB) gets the other nine columns."
# The composed mapping converts that exogenous column convention into
# modelled link endpoints, one for one:
#
#   IFA/IFA2/ElecLink -> FR      lands RGB   (3-zone header: intfr/intifa2/intelec -> RGB)
#   Nemo/BritNed      -> CONT-NW lands RGB   (intnem/intned -> RGB)
#   NSL               -> NO2     lands RGB   (intnsl -> RGB; "NSL at Blyth => RGB",
#                                             d11-sweep-review addendum — south of B6,
#                                             so Norwegian exchange cannot relieve or
#                                             load B6 directly: exactly the geometry
#                                             caveat (e) exists to measure)
#   Viking            -> DK1     lands RGB   (intvkl -> RGB)
#   Moyle             -> IE-SEM  lands SSCO  (intirl -> S-Scotland, Auchencrosh —
#                                             S-Scotland's ONLY external outlet, 0.5 GW)
#   EWIC              -> IE-SEM  lands RGB   (intew -> RGB)
#   Greenlink         -> IE-SEM  lands RGB   (intgrnl -> RGB; availability = 0.0
#                                             carried byte-identical — 2024
#                                             commissioning, contributes nothing)
#
# DECLARATION ORDER (flow.rs prose rule 6 — single pass, in-order):
# B4, then B6, then the ten external links in the committed 5-zone
# order (largest border first). B4->B6 is the committed physical
# cascade (3-zone obligation 4); clearing the internal cascade first
# lets wheeled-south northern surplus reach RGB BEFORE the export
# links clear — the export-channel-faithful order. The residual
# single-pass staleness (exports drain RGB after B6 has cleared, no
# second sweep) biases the rule-based leg toward UNDER-wheeling, i.e.
# toward OVERSTATING the constraint effect — charged to the
# dispatcher, not the geometry (design rule 1).
#
# ===================================================================
# PUMPED-STORAGE DOUBLE-COUNT WARNING (carried verbatim, design rule 3)
# ===================================================================
# GB pumped storage appears TWICE below the surface — the exogenous
# `pumped_storage_net` traces (observed 2024 actions, split 0.2617
# NSCO / 0.7383 RGB) AND the dispatchable `pumped_hydro` stores
# (Cruachan+Foyers 740 MW in NSCO; Dinorwig+Ffestiniog 2,088 MW in
# RGB). HARMLESS under the rule-based engine (both stores stay inert —
# ASSERTED, not assumed, by acceptance_d13_composed.rs), but a
# perfect-foresight LP WAKES the stores and the same physical assets
# act twice. Any LP use of this scenario MUST drop the pumped_hydro
# store from EVERY zone first (the acceptance_b4_lp precedent), and
# must convert the FR/NO2 budgeted hydro to observed-generation
# must-take traces (the LP core rejects energy budgets) — see
# grid-adequacy/tests/acceptance_d13_composed.rs.
#
# ATTRIBUTION: as the two committed files (NESO Open Data; DESNZ OGL
# v3.0; "Contains modified Copernicus Climate Change Service
# information [2024]"; ENTSO-E Transparency Platform).
#
# Everything not stated here is byte-carried from gb-2024-3zone.toml /
# gb-2024-5zone.toml and cited there.

schema_version = 8   # v8: version line only (no heating resource_depth_m set; docs/03 migration)
name = "GB-2024-8zone"
description = "GB 2024 split N-Scotland / S-Scotland / E+W (B4 + B6 boundaries) joined to the five modelled external zones (FR, CONT-NW, NO2, DK1, IE-SEM) — the D13 composed boundary-trade scenario"

[horizon]
start = "2024-01-01T00:00:00Z"   # UTC, half-hourly periods (17,568; leap year)
end   = "2024-12-31T23:30:00Z"
weather_years = [2024]

# =====================================================================
# N-SCO — North Scotland (SSEN area, north of B4). Byte-carried from
# gb-2024-3zone.toml (no net_imports block existed; N-Scotland has no
# external link) + the GB pricing chain (srmc.ccgt: Peterhead).
# =====================================================================

[[zones]]
id = "NSCO"

[zones.demand]
base_profile = "data/packs/2024/processed/demand_2024.parquet"
column = "underlying_demand"
annual_scale = 0.03333           # 33% of Scotland's 10.1% GB share (3-zone header)
extra_demand_gw = 0.022231       # station transformer, 0.33 x SCO 0.067367

[[zones.exogenous_supply]]
label = "pumped_storage_net"
# All Scottish PS is north of B4: N-Scotland takes the full Scottish PS
# power share 0.2617 (740/2828 MW). S-Scotland gets none.
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = ["ps"]
scale = 0.2617
reliability = "excluded"

[[zones.exogenous_supply]]
label = "other"
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = ["other"]
scale = 0.03333                  # N-Scotland demand share
reliability = "firm"

# D13 (composition departure 2): the committed GB SRMC chain (5-zone GB
# [zones.pricing], D11 review §C bit-identical to the reference chain),
# srmc restricted to this zone's gas fleet (ccgt: Peterhead).
[zones.pricing]
reference = "data/reference/prices-2024.toml"

[zones.pricing.fuel_price.gas]
path = "data/packs/2024/processed/gas_sap_daily_2024.parquet"
column = "sap_gbp_per_mwh_hhv"

[zones.pricing.srmc.ccgt]
fuel = "gas"
efficiency = "ccgt"

# --- Dispatchable ---

[[zones.fleet]]
technology = "ccgt"
capacity_gw = 1.18               # Peterhead 1,180 MW (Aberdeenshire, N of B4)

[[zones.fleet]]
technology = "hydro"
capacity_gw = 1.602008           # 0.9494 x SCO 1.68739 (REPD large+small N-share)
[zones.fleet.availability]
flat = 0.2147

# --- Weather-driven (nsco cf-gb3 sub-traces) ---

[[zones.fleet]]
technology = "onshore_wind"
capacity_gw = 4.107855           # 0.4077 x SCO 10.07568
capacity_factor_trace = "data/packs/cf-gb2/nsco_onshore_cf_2024.parquet"

[[zones.fleet]]
technology = "offshore_wind"
capacity_gw = 2.887883           # 0.9393 x SCO 3.074505 (94% of Scottish offshore)
capacity_factor_trace = "data/packs/cf-gb2/nsco_offshore_cf_2024.parquet"

[[zones.fleet]]
technology = "solar"
capacity_gw = 0.34705            # 0.6941 x SCO 0.5 (immaterial)
capacity_factor_trace = "data/packs/cf-gb2/nsco_solar_cf_2024.parquet"

# --- Storage (all Scottish PS is north of B4; Cruachan default N) ---
# DOUBLE-COUNT WARNING: see the header block — inert under rule-based
# (asserted), dropped in-memory on every LP leg.

[[zones.storage]]
kind = "pumped_hydro"
power_gw = 0.74                  # Cruachan 440 + Foyers 300 MW (both N; obligation 3)
energy_gwh = 13.4                # 7.1 + 6.3 GWh
round_trip_efficiency = 0.76
dispatch_order = 1

[[zones.storage]]
kind = "battery"
power_gw = 0.333377              # 0.4875 x SCO 0.68385
energy_gwh = 0.468146            # 0.4875 x SCO 0.9603
round_trip_efficiency = 0.88
dispatch_order = 2

# =====================================================================
# S-SCO — South Scotland (SP Transmission area, between B4 and B6).
# Byte-carried from gb-2024-3zone.toml MINUS the exogenous net_imports
# block (Moyle's intirl column — Moyle is now the MODELLED link below,
# landing here at Auchencrosh) + the GB pricing chain (no srmc entries:
# no gas plant between B4 and B6). B5 stays folded into this copper
