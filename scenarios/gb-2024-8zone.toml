[[zones.exogenous_supply]]
label = "other"
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = ["other"]
scale = 0.06767                  # S-Scotland demand share
reliability = "firm"

# D13 (composition departure 2): the committed GB SRMC chain; SSCO has
