column = "load_mw"
annual_scale = 1.0
# Identity wedge (5-zone header convention 4).
extra_demand_gw = 1.057

[zones.pricing]
reference = "data/reference/prices-2024.toml"
carbon_flat_gbp_per_tco2 = 55.01

# No priced technology: NO2 is ~100% hydro (5-zone note).

[[zones.fleet]]
technology = "hydro"
capacity_gw = 10.338          # A68 no2 B12 reservoir 9.816 + B10 pumped 0.522
# Weekly (336-period) observed-generation budgets (42.56 + 1.11 TWh) —
# the D5 seasonal-budget reservoir model (5-zone note).
[zones.fleet.energy_budget]
trace = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["hydro_reservoir", "hydro_pumped"]
window_periods = 336

[[zones.exogenous_supply]]
label = "no2_ror"
# Observed A75 run-of-river (7.09 TWh): must-take.
path = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["hydro_ror"]
reliability = "firm"

[[zones.exogenous_supply]]
label = "no2_wind"
# NO2 wind 4.52 TWh — absorbed explicitly (D5 condition).
path = "data/packs/entsoe-2024/processed/no2_generation_2024.parquet"
columns = ["wind_onshore"]
reliability = "variable"

