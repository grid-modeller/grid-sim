[zones.demand.heating]              # D9 rule 2 (schema v5); reviewed data package values
delivered_heat_twh = 410.5          # record-mean annual quantum (ECUK basis, cited in the data package)
electrified_share = 0.5             # the D9 rule-2 illustrative electrification level
dhw_fraction = 0.170                # reviewed DHW basis (fraction of delivered heat)
temperature_trace = { path = "data/weather/gb_t2m_pop.parquet", column = "t2m_pop" }

[[zones.demand.heating.entries]]
kind = "ashp"                       # COP defaults: data/reference/heating-cop.toml (drift-guarded)
share = 0.70

[[zones.demand.heating.entries]]
kind = "gshp"
share = 0.20

[[zones.demand.heating.entries]]
kind = "district_geothermal"
share = 0.10

