# Royal-Society-style 37+-year scenario WITH the D9 electrified-heating
# overlay (Q5/Q11 analysis runs; docs/notes/d9-heating-overlay.md rules
# 6/6b). Identical to scenarios/royal-society-37y.toml in fleet, demand
# tiling, horizon and store, plus the [zones.demand.heating] portfolio
# below -- the D9 0.70 ASHP / 0.20 GSHP / 0.10 district mix at the
# reviewed quantum (410.5 TWh record-mean delivered heat, GB;
# electrified_share 0.5; DHW fraction 0.170). A plain `run`/`solve` on
# this file reproduces the pinned characterisation point
# (grid-adequacy/tests/heating.rs); `grid-cli sweep heating-mix` uses
# this file as the TEMPLATE and replaces only the entry shares over the
# simplex.
#
# STORE-RATING WARNING (binding record,
# docs/notes/q5-heating-engine-review.md): the committed 100 GW rating
# below was chosen so the ENERGY requirement binds the solve -- that
# claim is FALSE under this heating block. The heated peak residual
# (113.4 GW at the D9 mix; 115.7 GW all-ASHP) exceeds 100 GW, and
# the heated solve at 100 GW is POWER-BOUND INFEASIBLE (pinned as the
# first finding). Analysis runs therefore solve at a STATED rating
# (200 GW) applied to BOTH endpoints of every delta, and every storage
# number is quoted "at 200 GW store power, both endpoints" with the
# 100 GW infeasibility finding travelling with it. SolveInfeasible at a
# committed rating is a reportable result, never silently bumped.
#
# Standing caveats on every number from this file (D9 rule 6): no
# within-day behavioural heating profile (portfolio deltas are LOWER
# BOUNDS); 2024 non-heat demand tiled over the record; climate-
# stationary heat intensity k (fixed building stock in every weather
# year). Original fleet/demand/store rationale: see
# scenarios/royal-society-37y.toml (unchanged here).

schema_version = 8   # v8: version line only (no heating resource_depth_m set; docs/03 migration)
name = "royal-society-37y-heated"
description = "The RS-style 37+-year fleet plus the D9 electrified-heating portfolio (410.5 TWh x 0.5 electrified; 0.70/0.20/0.10 ASHP/GSHP/district): the Q5/Q11 heating analysis scenario (D9 rules 6/6b)"

[horizon]
start = "1985-01-01T00:00:00Z"   # 701,280 half-hourly periods
end   = "2024-12-31T23:30:00Z"
weather_years = "all"

[[zones]]
id = "GB"

[zones.demand]
# 2024 profile tiled over 1985-2024 (concurrent data package).
annual_scale = 2.177             # 261.83 TWh x 2.177 = 570.00 TWh (see header)
column = "underlying_demand"     # D3 total-generation convention
