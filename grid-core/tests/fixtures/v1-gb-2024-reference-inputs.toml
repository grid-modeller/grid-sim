# FROZEN v1 TEST FIXTURE (schema_version 1, superseded 2026-07-02 by schema v2).
# Kept verbatim so the v1->v2 migration error path stays tested (docs/05 rule 4).
# The live, self-contained v2 scenario is scenarios/gb-2024-reference.toml.

# GB 2024 reference run inputs — Stage 1 companion to
# scenarios/gb-2024-reference.toml.
#
# WHAT THIS FILE IS. Stage 1 run-level inputs (docs/04 Stage 1): the
# exogenous traces and availability calibration a chronological dispatch
# run needs but the schema-v1 scenario file cannot carry (docs/03 has no
# TOML fields for availability, exogenous imports, or demand-side
# adjustments; adding them would force a schema_version bump the Stage 1
# work order does not include). This file is a first-class, hashable run
# input: results = f(scenario, run inputs, data pack, engine) per ADR-5,
# and its hash is embedded in every output artefact.
#
# Every number below is derived from the 2024 validation pack
# (data/packs/2024/, checksums data/packs/2024.sha256) and is guarded by a
# characterisation test (grid-adequacy/tests/acceptance_2024.rs) that
# re-derives it from the pack. Sources cited per entry.
#
# THE THREE CORRECTABLE WEDGES (docs/notes/2024-validation-pack-report.md
# §7) are handled here, plus a fourth fleet-coverage wedge:
#   1. Station transformer load ≈ 5.86 TWh/yr — demand-side constant
#      (`extra_demand_gw` below).
#   2. Pumped-storage round-trip loss 0.60 TWh — exogenous net supply
#      trace (storage is inert in Stage 1).
#   3. Coal closure 2024-09-30 — monthly availability windowed to zero
#      from October.
#   4. FUELHH "other" 3.35 TWh — small non-dispatchable generation with no
#      scenario fleet entry; exogenous must-take supply trace.

[demand]
# Column of the scenario's base_profile parquet to read (D3
# total-generation convention: underlying demand = ND + NESO embedded wind
# and solar estimates; docs/notes/d3-embedded-convention.md).
column = "underlying_demand"
# Station transformer load, GW, added to demand every period. Underlying
# demand excludes it (it sits on the supply side of the NESO/Elexon
# ledger), but the fleet must generate it, so a no-adjustment run would
# understate gas by ≈ 5.9 TWh (8.1 % of the gas target). Demand side is
# chosen because station load is a real, continuously-present power sink
# served by the whole stack, not a property of any one generator. Value:
# the mean 2024 residual of the cross-check identity FUELHH total (PS net)
# + net imports − ND = +667 MW (validation pack report §3; the constant is
# used rather than the per-period residual because the residual is stable
# at ≈ 0.67 GW but contains 20 known FUELHH publication glitches).
extra_demand_gw = 0.667

# --- Exogenous must-take supply traces (MW columns, summed; negative =
#     export / pumping demand). Stage 1 only: imports become modelled in
#     Stage 5, pumped storage becomes dispatched storage in Stage 3. ---

[[exogenous_supply]]
label = "net_imports"
# Elexon FUELHH per-interconnector flows, positive = import into GB.
# Chosen over the NESO per-link columns in demand_2024.parquet so that all
# exogenous supply comes from the one supply-side ledger; the two sources
# reconcile (pack report §1: corr ≥ 0.9996 per link, identical annual TWh).
# Annual net total: 33.30 TWh (the ±1 % Stage 1 trace-plumbing check).
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = [
  "intelec", "intew", "intfr", "intgrnl", "intifa2",
  "intirl", "intned", "intnem", "intnsl", "intvkl",
]
imports = true

[[exogenous_supply]]
label = "pumped_storage_net"
# FUELHH `ps` is NET pumped storage (negative = pumping; pack report §2).
# The scenario's storage entries are inert in Stage 1, so observed net PS
# enters as exogenous supply: this both reproduces PS peak-shaving within
# each day and lands the 0.60 TWh annual round-trip loss on the demand
# side instead of on modelled gas.
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = ["ps"]

[[exogenous_supply]]
label = "other"
# FUELHH "other" (waste, small CHP, misc.): 3.35 TWh in 2024, 4.6 % of the
# gas target. The scenario fleet has no corresponding technology (it is
# not dispatchable plant), so without this trace the whole category would
# land on modelled gas and consume most of the ±5 % tolerance.
path = "data/packs/2024/processed/generation_by_fuel_2024.parquet"
columns = ["other"]

# --- Availability calibration (dimensionless, applied to scenario
#     capacity). Technologies not listed default to flat 1.0 (ccgt, ocgt:
#     the balancing stack runs to nameplate). All values are CALIBRATION
#     to observed 2024 output, not engineering availability data: monthly
#     energy / (scenario capacity × hours in month), from
#     data/packs/2024/processed/monthly_generation_2024.csv. ---

[availability.nuclear]
# 2024 AGR outage pattern as a monthly profile (docs/04 Stage 1 allows a
# profile derived from observed nuclear output, documented as
# calibration). Observed monthly nuclear energy / (5.9 GW × hours).
# Annual: 38.33 TWh → mean factor 0.740.
monthly = [
  0.5569, 0.6379, 0.6408, 0.8721, 0.8245, 0.7963,
  0.7736, 0.8839, 0.7991, 0.6869, 0.7114, 0.6935,
]

[availability.biomass]
# Flat: 18.80 TWh / (3.5 GW × 8784 h). Biomass runs partly load-following
# in reality; a flat factor caps it at 2.14 GW, which the 2024 run
# tolerates (min system margin ≈ 0.2 GW; measured —
# docs/notes/stage-1-2024-run-report.md §1).
flat = 0.6116

[availability.hydro]
# Flat: 3.58 TWh / (1.9 GW × 8784 h) for NPSHYD run-of-river/reservoir.
flat = 0.2147

[availability.coal]
# Ratcliffe-on-Soar closed 2024-09-30; schema v1 has no mid-year capacity
# change, so the closure is windowed via the availability model (docs/04
# Stage 1): a single flat factor inside Jan–Sep — 1.57 TWh /
# (2.0 GW × 6588 h) — and zero from October. Expressed as a monthly
# profile; the closure lands exactly on a month boundary.
monthly = [
  0.11929, 0.11929, 0.11929, 0.11929, 0.11929, 0.11929,
  0.11929, 0.11929, 0.11929, 0.0, 0.0, 0.0,
]

# =====================================================================
# STAGE 2 — pricing inputs (docs/04 Stage 2; ADR-9). Everything above
# this line is the untouched Stage 1 dispatch input set: pricing is
# computed AFTER dispatch and cannot perturb it, so the Stage 1 pinned
# result digest is unchanged by this section.
#
# Numbers (efficiencies, emission factors, UKA auctions, CPS) are NOT
# transcribed here: they live in the committed, per-number-cited
# reference file below, and this section only names them — one source,
# no drift. The SRMC recipe and its HHV-consistency rule are documented
# in that file and in grid_core::pricing.
# =====================================================================

[pricing]
reference = "data/reference/prices-2024.toml"

# Daily gas System Average Price (ONS, OGL), upsampled to half-hourly in
# the pack build; £/MWh-thermal, gross CV (HHV). The only openly licensed
# GB hub gas price (NBP day-ahead assessments are proprietary — pack
# report §1).
[pricing.fuel_price.gas]
path = "data/packs/2024/processed/gas_sap_daily_2024.parquet"
column = "sap_gbp_per_mwh_hhv"

# SRMC recipes: gas fuel + the named [efficiency.*] key of the reference
# file. Technologies not listed (nuclear, biomass, hydro, coal) carry no
# SRMC model: they are must-run/calibrated plant in the Stage 1 stack and
# never set the price (grid_core::pricing conventions 1–2; coal's true
# 2024 SRMC often exceeded CCGT's, but its dispatch here is a windowed
# calibration, not an SRMC claim — see grid-adequacy dispatch docs).
[pricing.srmc.ccgt]
fuel = "gas"
efficiency = "ccgt"   # DUKES 5.10.C fleet average, 0.4893 HHV

[pricing.srmc.ocgt]
fuel = "gas"
efficiency = "ocgt"   # DESNZ/GHD 2025 new-plant value, 0.349 HHV

# Observed market price (Elexon MID, reference mid_price column) — the
# benchmark for the REPORTED (not gated) realism statistics of docs/04
# Stage 2: median model-SMP/observed-MID ratio and monthly correlation.
[pricing.observed_price]
path = "data/packs/2024/processed/market_index_2024.parquet"
column = "mid_price"
